services:
  postgres:
    image: postgres:17
    container_name: nazdikam-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nazdikam
      POSTGRES_PASSWORD: nazdikam123
      POSTGRES_DB: nazdikam
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: nazdikam-api
    depends_on:
      - postgres
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Temporary: show OTP in API/UI until SMS provider is connected
      EXPOSE_DEV_OTP: "true"
      # HTTP deploy (no HTTPS yet) — required for session cookie to work
      COOKIE_SECURE: "false"
      DATABASE_URL: postgresql://nazdikam:nazdikam123@postgres:5432/nazdikam
      SESSION_SECRET: change-this-to-a-long-random-secret
      PORT: 3001
    ports:
      - "3001:3001"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: nazdikam-web
    depends_on:
      - api
    restart: unless-stopped
    environment:
      PORT: 3000
      BASE_PATH: /
      API_PROXY_TARGET: http://api:3001
    ports:
      - "3000:3000"

volumes:
  postgres_data:

