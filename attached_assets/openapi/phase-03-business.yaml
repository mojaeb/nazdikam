            format: uuid
        - name: image_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                caption:
                  type: string
                  nullable: true
                sort_order:
                  type: integer
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GalleryImage'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'

    delete:
      tags: [BusinessProfile]
      summary: Delete a gallery image
      operationId: deleteGalleryImage
      security:
        - BearerAuth: []
      parameters:
        - name: business_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: image_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'

  # ── Verification ─────────────────────────────────────────────────────────

  /businesses/{business_id}/verification:
    get:
      tags: [BusinessVerification]
      summary: Get verification status and documents
      operationId: getVerificationStatus
      security:
        - BearerAuth: []
      parameters:
        - name: business_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Verification state
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    $ref: '#/components/schemas/VerificationStatus'
                  documents:
                    type: array
                    items:
                      $ref: '#/components/schemas/VerificationDocument'
                  required_document_types:
                    type: array
                    items:
                      type: string
                    description: |
                      Document types required for verification.
                      From system_settings.verification_required_documents_json.
                  rejection_reason:
                    type: string
                    nullable: true
                  submitted_at:
                    type: string
                    format: date-time
                    nullable: true
                  reviewed_at:
                    type: string
                    format: date-time
                    nullable: true
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'

  /businesses/{business_id}/verification/documents:
    post:
      tags: [BusinessVerification]
      summary: Submit a verification document
      description: |
        Submits one document file for a given document_type.
        document_type validated against system_settings.verification_document_types_json.
        Max file size: system_settings.verification_max_document_size_mb.
        Access level: BUSINESS_FREE.
      operationId: submitVerificationDocument
      security:
        - BearerAuth: []
      parameters:
        - name: business_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [document_type, file]
              properties:
                document_type:
                  type: string
                  description: |
                    Document type key. NOT an enum.
                    Valid values from system_settings.verification_document_types_json.
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Document submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationDocument'
        '401':
          $ref: '#/components/responses/401'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: File too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid document type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: INVALID_DOCUMENT_TYPE
                  message: نوع مدرک معتبر نیست

  /businesses/{business_id}/verification/submit:
    post:
      tags: [BusinessVerification]
      summary: Submit all documents for review
      description: |
        Transitions verification status to "pending".
        Validates that all required_document_types have been submitted.
        Notifies admin verification queue.
      operationId: submitVerificationForReview
      security:
        - BearerAuth: []
      parameters:
        - name: business_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Submitted for review
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    $ref: '#/components/schemas/VerificationStatus'
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/401'
        '422':
          description: Missing required documents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: MISSING_REQUIRED_DOCUMENTS
                  message: مدارک مورد نیاز ارسال نشده‌اند
                  details:
                    missing:
                      - national_id
                      - shop_photo

  # ── Public Profile ───────────────────────────────────────────────────────

  /b/{slug}:
    get:
      tags: [BusinessPublic]
      summary: Get public business profile
      description: |
        Returns the public-facing business profile.
        If authenticated: populates is_followed, is_saved.
        If not authenticated: is_followed and is_saved are null.
        Suspended or deleted businesses return 404 (not 403) to avoid status leakage.
        Cache: system_settings.business_public_profile_cache_ttl_seconds.
        Rate limit: system_settings.rate_limit_public_profile_per_ip_per_minute.
      operationId: getPublicBusinessProfile
      security: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: Authorization
          in: header
          required: false
          schema:
            type: string
          description: Optional — if provided and valid, personalises is_followed/is_saved
      responses:
        '200':
          description: Public business profile
          headers:
            Cache-Control:
              schema:
                type: string
              example: "public, max-age=60"
              description: TTL from system_settings.business_public_profile_cache_ttl_seconds
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessPublicProfile'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'

  # ── User Businesses List ─────────────────────────────────────────────────

  /users/me/businesses:
    get:
      tags: [BusinessProfile]
      summary: List businesses owned by the current user
      operationId: listMyBusinesses
      security:
        - BearerAuth: []
      responses:
        '200':
          description: My businesses
          content:
            application/json:
              schema:
                type: object
                properties:
                  businesses:
                    type: array
                    items:
                      $ref: '#/components/schemas/BusinessSummary'
                  total:
                    type: integer
        '401':
          $ref: '#/components/responses/401'

  # ── Follow / Save ────────────────────────────────────────────────────────

  /businesses/{business_id}/follow:
    post:
      tags: [BusinessInteractions]
      summary: Follow a business
      description: |
        Idempotent — following an already-followed business returns 200.
        Access level: REGISTERED.
        Rate limit: system_settings.rate_limit_follow_per_user_per_minute.
      operationId: followBusiness
      security:
        - BearerAuth: []
      parameters:
        - name: business_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Followed (or already following)
          content:
            application/json:
              schema:
                type: object
                properties:
                  is_followed:
                    type: boolean
                    example: true
                  follow_count:
                    type: integer
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'

    delete:
      tags: [BusinessInteractions]
      summary: Unfollow a business
      operationId: unfollowBusiness
      security:
        - BearerAuth: []
      parameters:
        - name: business_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Unfollowed
          content:
            application/json:
              schema:
                type: object
                properties:
                  is_followed:
                    type: boolean
                    example: false
                  follow_count:
                    type: integer
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'

  /businesses/{business_id}/save:
    post:
      tags: [BusinessInteractions]
      summary: Save (bookmark) a business
      description: |
        Idempotent. Access level: REGISTERED.
        Rate limit: system_settings.rate_limit_save_per_user_per_minute.
      operationId: saveBusiness
      security:
        - BearerAuth: []
      parameters:
        - name: business_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  is_saved:
                    type: boolean
                    example: true
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'

    delete:
      tags: [BusinessInteractions]
      summary: Remove business from saved
      operationId: unsaveBusiness
      security:
        - BearerAuth: []
      parameters:
        - name: business_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Removed from saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  is_saved:
                    type: boolean
                    example: false
        '401':
          $ref: '#/components/responses/401'

  /users/me/saved/businesses:
    get:
      tags: [BusinessInteractions]
      summary: List saved businesses for current user
      operationId: listSavedBusinesses
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Saved businesses
          content:
            application/json:
              schema:
                type: object
                properties:
                  businesses:
                    type: array
                    items:
                      $ref: '#/components/schemas/BusinessSummary'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/401'

  /users/me/following:
    get:
      tags: [BusinessInteractions]
      summary: List businesses followed by current user
      operationId: listFollowedBusinesses
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
