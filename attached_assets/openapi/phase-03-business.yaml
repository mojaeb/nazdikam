                    type: integer

    post:
      tags: [BusinessProfile]
      summary: Upload gallery image
      description: |
        Adds a new gallery image.
        Feature gate: can_upload_gallery (BUSINESS_SUBSCRIBED)
        Usage limit: max_gallery_images from plan snapshot.
        Max file size: usage_limits.max_image_file_size_mb.
      operationId: uploadGalleryImage
      security:
        - BearerAuth: []
      parameters:
        - name: business_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                caption:
                  type: string
                  nullable: true
      responses:
        '201':
          description: Image uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GalleryImage'
        '401':
          $ref: '#/components/responses/401'
        '403':
          oneOf:
            - $ref: '#/components/responses/403FeatureFlag'
            - $ref: '#/components/responses/403UsageLimit'
        '413':
          description: File too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /businesses/{business_id}/gallery/{image_id}:
