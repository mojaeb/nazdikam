  # ── Contact Methods ──────────────────────────────────────────────────────

  /businesses/{business_id}/contact-methods:
    get:
      tags: [BusinessProfile]
      summary: List all contact methods for a business
      operationId: listContactMethods
      security:
        - BearerAuth: []
      parameters:
        - name: business_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Contact methods list
          content:
            application/json:
              schema:
                type: object
                properties:
                  contact_methods:
                    type: array
                    items:
                      $ref: '#/components/schemas/ContactMethod'
                  available_types:
                    type: array
                    items:
                      type: string
                    description: |
                      Available contact method types from system_settings.contact_method_types_json.
                      Client uses this to populate the "add contact method" dropdown.
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'

    post:
      tags: [BusinessProfile]
      summary: Add a contact method
      description: |
        Adds a new contact method. Type is validated against
        system_settings.contact_method_types_json. Unknown types are rejected.
        Access level: BUSINESS_FREE.
      operationId: addContactMethod
      security:
        - BearerAuth: []
      parameters:
        - name: business_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, value]
              properties:
                type:
                  type: string
                value:
                  type: string
                label:
                  type: string
                  nullable: true
                is_primary:
                  type: boolean
                  default: false
                is_visible:
                  type: boolean
                  default: true
      responses:
        '201':
          description: Contact method created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactMethod'
        '401':
          $ref: '#/components/responses/401'
        '422':
          description: |
            Invalid contact method type or value format.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: INVALID_CONTACT_TYPE
                  message: نوع روش تماس معتبر نیست

  /businesses/{business_id}/contact-methods/{contact_id}:
    put:
      tags: [BusinessProfile]
      summary: Update a contact method
      operationId: updateContactMethod
      security:
        - BearerAuth: []
      parameters:
        - name: business_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: contact_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: string
                label:
                  type: string
                  nullable: true
                is_primary:
                  type: boolean
                is_visible:
                  type: boolean
                sort_order:
                  type: integer
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactMethod'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'

    delete:
      tags: [BusinessProfile]
      summary: Delete a contact method
      operationId: deleteContactMethod
      security:
        - BearerAuth: []
      parameters:
        - name: business_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: contact_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'

  # ── Gallery ──────────────────────────────────────────────────────────────

  /businesses/{business_id}/gallery:
    get:
      tags: [BusinessProfile]
      summary: List gallery images
      operationId: listGalleryImages
      security:
        - BearerAuth: []
