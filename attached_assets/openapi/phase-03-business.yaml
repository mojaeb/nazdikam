openapi: 3.1.0

info:
  title: Nazdikam API
  version: 1.0.0
  description: |
    نزدیکام — Phase 3: Business Management
    Persian RTL · Mobile-first · Location-based · Northern Iran

    ## Coverage
    Business registration wizard, business profile management, verification,
    contact methods, gallery, follow/save interactions, and public profile endpoints.

    ## Architecture Guardrails
    - Business types: DB-backed strings — NEVER enum
    - Verification levels: DB-backed strings — NEVER enum
    - Badges: DB-backed strings — NEVER enum
    - Business statuses: plain strings — NEVER enum
    - Contact method types: plain strings — NEVER enum
    - All limits from system_settings or plan usage_limits
    - Feature gates via entitlement checks only (no plan-name logic)

    ## Entitlement Headers
    Responses for entitlement-gated resources include:
    - `X-Feature-Flag`: the flag key being checked
    - `X-Entitlement-Status`: `granted` | `denied`
    - On 403 for feature gates: error code is `FEATURE_FLAG_DENIED`
    - On 403 for usage limits: error code is `USAGE_LIMIT_REACHED`

servers:
  - url: /api
    description: Shared proxy — all paths prefixed with /api

tags:
  - name: BusinessRegistration
    description: Business registration wizard (create and wizard steps)
  - name: BusinessProfile
    description: Business owner profile management
  - name: BusinessPublic
    description: Public-facing business profile endpoints
  - name: BusinessVerification
    description: Identity verification document submission
  - name: BusinessInteractions
    description: Follow, save, and social interaction by consumers

security: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT issued on successful OTP verification.
        Pass as: `Authorization: Bearer <token>`

  schemas:

    # ── Common ──────────────────────────────────────────────

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true

    PaginationMeta:
      type: object
      required: [page, per_page, total, total_pages]
      properties:
        page:
          type: integer
          minimum: 1
        per_page:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        total_pages:
          type: integer
          minimum: 0

    # ── Business Schemas ─────────────────────────────────────

    BusinessStatus:
      type: string
      description: |
        Current lifecycle status of the business.
        NOT an enum — valid statuses are defined in system_settings.business_statuses_json.
        Known initial values: "draft", "pending_review", "active", "suspended", "rejected", "deleted".
        Clients must handle unknown status values gracefully.
      examples:
        - draft
        - pending_review
        - active
        - suspended
        - rejected

    VerificationStatus:
      type: string
      description: |
        Current identity verification status.
        NOT an enum — valid values are defined in system_settings.verification_statuses_json.
        Known initial values: "not_submitted", "pending", "approved", "rejected", "resubmit_required".
        Clients must handle unknown values gracefully.
      examples:
        - not_submitted
        - pending
        - approved
        - rejected
        - resubmit_required

    GeoPoint:
      type: object
      required: [lat, lng]
      properties:
        lat:
          type: number
          format: double
          minimum: -90
          maximum: 90
          description: Latitude in decimal degrees (WGS-84)
        lng:
          type: number
          format: double
          minimum: -180
          maximum: 180
          description: Longitude in decimal degrees (WGS-84)

    ContactMethod:
      type: object
      required: [id, type, value, is_primary, is_visible, sort_order]
      description: |
        A typed contact method. The `type` field is NOT an enum.
        Valid types come from system_settings.contact_method_types_json.
        Known initial types: "mobile", "landline", "whatsapp", "telegram", "email",
        "website", "instagram", "linkedin".
        Clients must handle unknown types gracefully (render as generic link).
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          examples:
            - mobile
            - landline
            - whatsapp
            - telegram
            - email
            - website
            - instagram
            - linkedin
        value:
          type: string
          description: The contact value (phone number, URL, handle, etc.)
        label:
          type: string
          nullable: true
          description: Optional custom label override (e.g. "شعبه مرکزی")
        is_primary:
          type: boolean
        is_visible:
          type: boolean
          description: Whether visible on public profile page
        sort_order:
          type: integer
        created_at:
          type: string
          format: date-time

    Badge:
      type: object
      required: [key, label]
      description: |
        A badge displayed on the business profile.
        Badge keys are NOT an enum — they are managed via Admin CMS.
        Known initial keys: "verified", "top_business", "new", "featured".
        Clients must handle unknown badge keys gracefully.
      properties:
        key:
          type: string
          examples:
            - verified
            - top_business
            - new
            - featured
        label:
          type: string
          description: Persian display label for the badge
        color:
          type: string
          nullable: true
          description: Hex color for badge rendering
        icon_url:
          type: string
          format: uri
          nullable: true

    GalleryImage:
      type: object
      required: [id, url, sort_order, created_at]
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        thumbnail_url:
          type: string
          format: uri
          nullable: true
        caption:
          type: string
          nullable: true
        sort_order:
          type: integer
        created_at:
          type: string
          format: date-time

    BusinessAddress:
      type: object
      properties:
        province_id:
          type: string
          format: uuid
          nullable: true
        city_id:
          type: string
          format: uuid
          nullable: true
        address_line:
          type: string
          nullable: true
          description: Free-text address
          maxLength: 500
        postal_code:
          type: string
          nullable: true
        geo:
          $ref: '#/components/schemas/GeoPoint'
          nullable: true
        map_provider_links:
          type: object
          description: |
            Pre-computed deep links for supported map providers.
            Keys are NOT an enum — they come from system_settings.map_provider_keys_json.
            Known initial keys: "neshan", "balad", "google_maps".
          additionalProperties:
            type: string
            format: uri
          examples:
            - neshan: "https://neshan.org/maps/@36.5,52.3"
              balad: "https://balad.ir/location?lat=36.5&lng=52.3"

    BusinessSummary:
      type: object
      required: [id, name, slug, status, category_id, city_id, created_at]
      description: Compact representation used in lists and search results.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        name_en:
          type: string
          nullable: true
        slug:
          type: string
        status:
          $ref: '#/components/schemas/BusinessStatus'
        logo_url:
          type: string
          format: uri
          nullable: true
        category_id:
          type: string
          format: uuid
        category_name:
          type: string
          nullable: true
          description: Denormalised for display; the authoritative value is via /categories/{id}
        city_id:
          type: string
          format: uuid
        city_name:
          type: string
          nullable: true
          description: Denormalised for display; the authoritative value is via /locations/cities/{id}
        verification_status:
          $ref: '#/components/schemas/VerificationStatus'
        badges:
          type: array
          items:
            $ref: '#/components/schemas/Badge'
        is_subscribed:
          type: boolean
          description: Whether the business currently has an active subscription
        created_at:
          type: string
          format: date-time

    BusinessDetail:
      type: object
      required: [id, name, slug, status, category_id, city_id, created_at]
      description: Full business record returned to the owner.
      allOf:
        - $ref: '#/components/schemas/BusinessSummary'
        - type: object
          properties:
            description:
              type: string
              nullable: true
            banner_url:
              type: string
              format: uri
              nullable: true
            subcategory_id:
              type: string
              format: uuid
              nullable: true
            address:
              $ref: '#/components/schemas/BusinessAddress'
            contact_methods:
              type: array
              items:
                $ref: '#/components/schemas/ContactMethod'
            social_links:
              type: array
              items:
                $ref: '#/components/schemas/ContactMethod'
              description: Social links share the same ContactMethod schema; type distinguishes them.
            gallery:
              type: array
              items:
                $ref: '#/components/schemas/GalleryImage'
            wizard_step:
              type: integer
              minimum: 0
              description: |
                Last completed wizard step (0-based). Null means wizard completed.
                Steps: 0=basic_info, 1=location, 2=contact, 3=review_submitted.
                Max step count: system_settings.business_registration_wizard_steps.
              nullable: true
            owner_user_id:
              type: string
              format: uuid
            metadata:
              type: object
              additionalProperties: true
              description: |
                Extensible key-value metadata. Keys are defined in Admin CMS.
                Clients must handle unknown keys gracefully.
            entitlements:
              $ref: '#/components/schemas/BusinessEntitlements'
            updated_at:
              type: string
              format: date-time
            subscription_expires_at:
              type: string
              format: date-time
              nullable: true
            subscription_expires_at_jalali:
              type: string
              nullable: true
              description: Jalali formatted date, e.g. "۱۴۰۳/۰۹/۱۵"

    BusinessPublicProfile:
      type: object
      required: [id, name, slug, category_id, city_id]
      description: |
        Public-facing business profile. Returned for GET /businesses/:slug.
        Only includes data that should be visible to anonymous visitors.
        Owner-only fields (e.g. entitlements, wizard_step) are excluded.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        name_en:
          type: string
          nullable: true
        slug:
          type: string
        description:
          type: string
          nullable: true
        logo_url:
          type: string
          format: uri
          nullable: true
        banner_url:
          type: string
          format: uri
          nullable: true
        category_id:
          type: string
          format: uuid
        category_name:
          type: string
          nullable: true
        subcategory_id:
          type: string
          format: uuid
          nullable: true
        city_id:
          type: string
          format: uuid
        city_name:
          type: string
          nullable: true
        province_id:
          type: string
          format: uuid
          nullable: true
        address:
          $ref: '#/components/schemas/BusinessAddress'
        contact_methods:
          type: array
          items:
            $ref: '#/components/schemas/ContactMethod'
          description: Only contact methods with is_visible=true
        gallery:
          type: array
          items:
            $ref: '#/components/schemas/GalleryImage'
        badges:
          type: array
          items:
            $ref: '#/components/schemas/Badge'
        verification_status:
          $ref: '#/components/schemas/VerificationStatus'
        is_subscribed:
          type: boolean
        follow_count:
          type: integer
        save_count:
          type: integer
        is_followed:
          type: boolean
          nullable: true
          description: |
            Whether the current authenticated user follows this business.
            Null if request is unauthenticated.
        is_saved:
          type: boolean
          nullable: true
          description: |
            Whether the current authenticated user has saved this business.
            Null if request is unauthenticated.
        created_at:
          type: string
          format: date-time
        page_sections:
          type: array
          description: |
            Ordered list of content sections to render on the public profile.
            Order and visibility come from system_settings.business_page_sections_json.
            Each section type is a string (NOT enum); known types:
            "products", "services", "videos", "announcements", "gallery", "contact", "map".
          items:
            type: object
            required: [type, is_visible]
            properties:
              type:
                type: string
              is_visible:
                type: boolean
              sort_order:
                type: integer

    BusinessEntitlements:
      type: object
      description: |
        Snapshot of current entitlements for this business.
        Derived from the active subscription's plan snapshot.
        feature_flags and usage_limits keys are NOT an enum — they come from
        the plans table. Clients must handle unknown keys gracefully.
      properties:
        feature_flags:
          type: object
          additionalProperties:
            type: boolean
          description: |
            Boolean feature gates. Keys: see Feature Flag Matrix.
            Example: { "can_manage_products": true, "can_manage_videos": false }
        usage_limits:
          type: object
          additionalProperties:
            type: integer
          description: |
            Numeric limits. -1 means unlimited. Keys: see Usage Limits Catalog.
            Example: { "max_products": 20, "max_gallery_images": 10 }
        current_usage:
          type: object
          additionalProperties:
            type: integer
          description: |
            Current consumption per limit key.
            Example: { "max_products": 7, "max_gallery_images": 3 }

    VerificationDocument:
      type: object
      required: [id, document_type, file_url, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        document_type:
          type: string
          description: |
            Type of submitted document.
            NOT an enum — valid types come from system_settings.verification_document_types_json.
            Known initial types: "national_id", "business_license", "selfie_with_id", "shop_photo".
          examples:
            - national_id
            - business_license
            - selfie_with_id
            - shop_photo
        file_url:
          type: string
          format: uri
        status:
          $ref: '#/components/schemas/VerificationStatus'
        rejection_reason:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        reviewed_at:
          type: string
          format: date-time
          nullable: true

  parameters:
    BusinessSlugOrId:
      name: slug_or_id
      in: path
      required: true
      schema:
        type: string
      description: Business slug (for public endpoints) or UUID (for owner/admin endpoints)

    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1

    PerPageParam:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 20
      description: |
        Items per page. Max: system_settings.search_max_per_page.

  responses:
    401:
      description: Unauthorized — missing or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: UNAUTHORIZED
              message: احراز هویت الزامی است

    403FeatureFlag:
      description: Forbidden — feature flag not granted by active subscription
      headers:
        X-Feature-Flag:
          schema:
            type: string
          description: The feature flag key that was checked
        X-Entitlement-Status:
          schema:
            type: string
            enum: [denied]
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: FEATURE_FLAG_DENIED
              message: این ویژگی در پلن فعلی شما در دسترس نیست
              details:
                flag: can_manage_products
                upgrade_path: /api/subscriptions/plans

    403UsageLimit:
      description: Forbidden — usage limit reached for this plan
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: USAGE_LIMIT_REACHED
              message: به حداکثر تعداد مجاز رسیده‌اید
              details:
                limit_key: max_products
                current: 20
                maximum: 20
                upgrade_path: /api/subscriptions/plans

    404:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: NOT_FOUND
              message: یافت نشد

    422:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    429:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

# ─────────────────────────────────────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────────────────────────────────────

paths:

  # ── Business Registration ────────────────────────────────────────────────

  /businesses:
    post:
      tags: [BusinessRegistration]
      summary: Start business registration (create draft)
      description: |
        Creates a new business in "draft" status and returns the first wizard step.
        Checks system_settings.max_businesses_per_user against the user's existing business count.
        Rate limit: system_settings.rate_limit_business_create_per_user_per_day.
      operationId: createBusiness
      security:
        - BearerAuth: []
      parameters:
        - name: X-App-Version
          in: header
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, category_id, city_id]
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                  description: |
                    Min/max from system_settings.business_name_min_length / business_name_max_length
                name_en:
                  type: string
                  nullable: true
                  maxLength: 100
                category_id:
                  type: string
                  format: uuid
                subcategory_id:
                  type: string
                  format: uuid
                  nullable: true
                description:
                  type: string
                  nullable: true
                  maxLength: 2000
                  description: Max from system_settings.business_description_max_length
                referral_code:
                  type: string
                  nullable: true
                  description: Optional referral code used at registration
      responses:
        '201':
          description: Business draft created
          content:
            application/json:
              schema:
                type: object
                required: [business, wizard]
                properties:
                  business:
                    $ref: '#/components/schemas/BusinessDetail'
                  wizard:
                    $ref: '#/components/schemas/WizardState'
        '401':
          $ref: '#/components/responses/401'
        '403':
          description: |
            Forbidden — max_businesses_per_user reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: BUSINESS_LIMIT_REACHED
                  message: به حداکثر تعداد کسب‌وکار مجاز رسیده‌اید
                  details:
                    current: 3
                    maximum: 3
        '422':
          $ref: '#/components/responses/422'
        '429':
          $ref: '#/components/responses/429'

  /businesses/{business_id}/wizard/{step}:
    put:
      tags: [BusinessRegistration]
      summary: Save a wizard step
      description: |
        Idempotent — can be called multiple times. Advances `wizard_step` if the submitted
        step is current or prior. Step names come from system_settings.business_registration_wizard_steps.
        Step IDs are strings (NOT enum): "basic_info", "location", "contact", "review".
      operationId: saveWizardStep
      security:
        - BearerAuth: []
      parameters:
        - name: business_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: step
          in: path
          required: true
          schema:
            type: string
          description: |
            Wizard step identifier. NOT an enum — valid steps from
            system_settings.business_registration_wizard_steps.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: |
                Step-specific payload. Shape depends on the step.
                The server validates against the step definition in system_settings.
                additionalProperties accepted and ignored for forward-compatibility.
              additionalProperties: true
              properties:
                name:
                  type: string
                name_en:
                  type: string
                  nullable: true
                category_id:
                  type: string
                  format: uuid
                subcategory_id:
                  type: string
                  format: uuid
                  nullable: true
                description:
                  type: string
                  nullable: true
                province_id:
                  type: string
                  format: uuid
                city_id:
                  type: string
                  format: uuid
                address_line:
                  type: string
                  nullable: true
                postal_code:
                  type: string
                  nullable: true
                geo:
                  $ref: '#/components/schemas/GeoPoint'
                contact_methods:
                  type: array
                  items:
                    type: object
                    required: [type, value]
                    properties:
                      type:
                        type: string
                      value:
                        type: string
                      label:
                        type: string
                        nullable: true
                      is_primary:
                        type: boolean
                        default: false
                      is_visible:
                        type: boolean
                        default: true
      responses:
        '200':
          description: Step saved
          content:
            application/json:
              schema:
                type: object
                required: [business, wizard]
                properties:
                  business:
                    $ref: '#/components/schemas/BusinessDetail'
                  wizard:
                    $ref: '#/components/schemas/WizardState'
        '401':
          $ref: '#/components/responses/401'
        '403':
          description: Forbidden — not business owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/404'
        '422':
          $ref: '#/components/responses/422'

  /businesses/{business_id}/wizard/submit:
    post:
      tags: [BusinessRegistration]
      summary: Submit business for review
      description: |
        Transitions business from "draft" to "pending_review".
        Validates all required wizard fields are complete.
        Notifies admin queue of new submission.
      operationId: submitBusinessForReview
      security:
        - BearerAuth: []
      parameters:
        - name: business_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Submitted for review
          content:
            application/json:
              schema:
                type: object
                properties:
                  business:
                    $ref: '#/components/schemas/BusinessDetail'
                  message:
                    type: string
                    example: "کسب‌وکار شما برای بررسی ارسال شد"
        '401':
          $ref: '#/components/responses/401'
        '403':
          description: Forbidden — not owner or business not in draft status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Incomplete wizard — missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: WIZARD_INCOMPLETE
                  message: اطلاعات لازم کامل نیست
                  details:
                    missing_steps:
                      - location
                      - contact

  # ── Business Owner Management ────────────────────────────────────────────

  /businesses/{business_id}:
    get:
      tags: [BusinessProfile]
      summary: Get business detail (owner view)
      description: |
        Returns full BusinessDetail including entitlements, wizard_step, and all private fields.
        Caller must own the business OR be Super Admin.
      operationId: getBusinessOwnerView
      security:
        - BearerAuth: []
      parameters:
        - name: business_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Business detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessDetail'
        '401':
          $ref: '#/components/responses/401'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/404'

    patch:
      tags: [BusinessProfile]
      summary: Update business profile fields
      description: |
        Partial update. Only the provided fields are changed.
        Requires owner or Super Admin.
        Access level: BUSINESS_FREE — no subscription needed.
        Fields gated by entitlements have individual notes.
      operationId: updateBusiness
      security:
        - BearerAuth: []
      parameters:
        - name: business_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                name_en:
                  type: string
                  nullable: true
                description:
                  type: string
                  nullable: true
                  maxLength: 2000
                category_id:
                  type: string
                  format: uuid
                subcategory_id:
                  type: string
                  format: uuid
                  nullable: true
                address:
                  type: object
                  properties:
                    province_id:
                      type: string
                      format: uuid
                      nullable: true
                    city_id:
                      type: string
                      format: uuid
                      nullable: true
                    address_line:
                      type: string
                      nullable: true
                    postal_code:
                      type: string
                      nullable: true
                    geo:
                      $ref: '#/components/schemas/GeoPoint'
                      nullable: true
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessDetail'
        '401':
          $ref: '#/components/responses/401'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/404'
        '422':
          $ref: '#/components/responses/422'

    delete:
      tags: [BusinessProfile]
      summary: Request business deletion
      description: |
        Transitions business to "deleted" status (soft delete).
        Actual data purge schedule from system_settings.business_deletion_purge_days.
        Owner only. Confirmation phrase required to prevent accidents.
      operationId: deleteBusiness
      security:
        - BearerAuth: []
      parameters:
        - name: business_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirmation]
              properties:
                confirmation:
                  type: string
                  description: |
                    Must match system_settings.business_deletion_confirmation_phrase.
                    Default phrase in Persian: "حذف کسب‌وکار"
      responses:
        '200':
          description: Deletion initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  purge_scheduled_at:
                    type: string
                    format: date-time
        '401':
          $ref: '#/components/responses/401'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/404'
        '422':
          description: Wrong confirmation phrase
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: INVALID_CONFIRMATION
                  message: عبارت تأییدیه صحیح نیست

