openapi: 3.1.0

info:
  title: Nazdikam API
  version: 1.0.0
  description: |
    نزدیکام — Phase 4: Products & Services
    Persian RTL · Mobile-first · Location-based · Northern Iran

    ## Coverage
    Product CRUD, Service CRUD, media upload, visibility, categories,
    save/bookmark by consumers, and public listing endpoints.

    ## Architecture Guardrails
    - Feature gates via entitlements ONLY — no plan-name logic
    - No hardcoded limits — all from plan usage_limits
    - Media constraints from system_settings
    - Product/service types: NOT enum — extensible strings
    - Pricing currency: NOT hardcoded — from system_settings.platform_currency
    - All per-page limits from system_settings

    ## Entitlement Enforcement
    Endpoints that require a feature flag return:
    - 403 with code FEATURE_FLAG_DENIED when the flag is false
    - 403 with code USAGE_LIMIT_REACHED when the numeric limit is reached
    Both codes include `details.upgrade_path` pointing to the plans endpoint.

servers:
  - url: /api
    description: Shared proxy — all paths prefixed with /api

tags:
  - name: Products
    description: Product management by business owners
  - name: ProductsPublic
    description: Public-facing product browsing
  - name: Services
    description: Service management by business owners
  - name: ServicesPublic
    description: Public-facing service browsing
  - name: ContentSave
    description: Save/bookmark products and services by consumers

security: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true

    PaginationMeta:
      type: object
      required: [page, per_page, total, total_pages]
      properties:
        page:
          type: integer
          minimum: 1
        per_page:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        total_pages:
          type: integer
          minimum: 0

    Price:
      type: object
      description: |
        Monetary value. Currency is NOT hardcoded — it is always
        system_settings.platform_currency (default: "IRR" / تومان display).
        `display_value` is a formatted string for the current locale, e.g. "۱۲۰,۰۰۰ تومان".
        Clients must use `display_value` for rendering; never format raw_amount themselves.
      properties:
        raw_amount:
          type: integer
          minimum: 0
          description: Amount in the smallest unit of system_settings.platform_currency
          nullable: true
        currency:
          type: string
          description: Currency code from system_settings.platform_currency
          examples:
            - IRR
            - USD
        display_value:
          type: string
          nullable: true
          description: Pre-formatted display string in the response locale
          examples:
            - "۱۲۰,۰۰۰ تومان"

    InstallmentTerms:
      type: object
      description: |
        Installment payment terms. All thresholds from system_settings.
        max_months from system_settings.installment_max_months.
      properties:
        is_available:
          type: boolean
        months:
          type: integer
          nullable: true
          minimum: 1
          description: |
            Number of installment months.
            Must be <= system_settings.installment_max_months.
        down_payment:
          $ref: '#/components/schemas/Price'
          nullable: true
        monthly_payment:
          $ref: '#/components/schemas/Price'
          nullable: true
        description:
          type: string
          nullable: true
          description: Free-text installment description (Persian)

    ContentModerationState:
      type: string
      description: |
        Moderation state of the content item.
        NOT an enum — valid states from system_settings.moderation_states_json.
        Known initial states: "pending_review", "approved", "rejected", "flagged".
        Auto-approved if system_settings.content_auto_approve = true.
      examples:
        - pending_review
        - approved
        - rejected
        - flagged

    ProductImage:
      type: object
      required: [id, url, sort_order, created_at]
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        thumbnail_url:
          type: string
          format: uri
          nullable: true
        alt_text:
          type: string
          nullable: true
        is_cover:
          type: boolean
          description: Whether this is the primary cover image
        sort_order:
          type: integer
        created_at:
          type: string
          format: date-time

    Product:
      type: object
      required: [id, business_id, name, is_active, created_at]
      properties:
        id:
          type: string
          format: uuid
        business_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        category_id:
          type: string
          format: uuid
          nullable: true
          description: Category this product belongs to (may differ from business category)
        is_active:
          type: boolean
          description: Owner-controlled visibility toggle
        moderation_state:
          $ref: '#/components/schemas/ContentModerationState'
        price:
          $ref: '#/components/schemas/Price'
          nullable: true
          description: |
            Present only if feature_flags.can_set_product_price = true.
            Null if price is not set.
        has_discount:
          type: boolean
          description: |
            Present only if feature_flags.can_show_product_discount = true.
        discount_percent:
          type: integer
          nullable: true
          minimum: 1
          maximum: 99
          description: |
            Present only if has_discount = true.
            Max from system_settings.product_max_discount_percent.
        original_price:
          $ref: '#/components/schemas/Price'
          nullable: true
          description: Price before discount, if has_discount = true
        installment:
          $ref: '#/components/schemas/InstallmentTerms'
          nullable: true
          description: Present only if feature_flags.can_show_product_installment = true
        images:
          type: array
          items:
            $ref: '#/components/schemas/ProductImage'
          description: |
            Feature gate: can_upload_product_images.
            Max images: usage_limits.max_product_images.
        attributes:
          type: object
          additionalProperties: true
          description: |
            Extensible product attributes. Keys defined in Admin CMS.
            Clients must handle unknown keys gracefully.
        is_saved:
          type: boolean
          nullable: true
          description: Whether current user has saved this product (null if unauthenticated)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Service:
      type: object
      required: [id, business_id, name, is_active, created_at]
      description: Service mirrors Product structure. Separate schema for clarity.
      properties:
        id:
          type: string
          format: uuid
        business_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        category_id:
          type: string
          format: uuid
          nullable: true
        is_active:
          type: boolean
        moderation_state:
          $ref: '#/components/schemas/ContentModerationState'
        price:
          $ref: '#/components/schemas/Price'
          nullable: true
        has_discount:
          type: boolean
        discount_percent:
          type: integer
          nullable: true
          minimum: 1
          maximum: 99
        original_price:
          $ref: '#/components/schemas/Price'
          nullable: true
        installment:
          $ref: '#/components/schemas/InstallmentTerms'
          nullable: true
        service_type:
          type: string
          nullable: true
          description: |
            Service type label. NOT an enum.
            Valid types from system_settings.service_types_json if configured.
            Unknown values are accepted and displayed as-is.
        attributes:
          type: object
          additionalProperties: true
        is_saved:
          type: boolean
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

  parameters:
    BusinessIdPath:
      name: business_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    ProductIdPath:
      name: product_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    ServiceIdPath:
      name: service_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1

    PerPageParam:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 20
      description: Max from system_settings.search_max_per_page

  responses:
    401:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    403FeatureFlag:
      description: Feature flag denied
      headers:
        X-Feature-Flag:
          schema:
            type: string
        X-Entitlement-Status:
          schema:
            type: string
            enum: [denied]
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: FEATURE_FLAG_DENIED
              message: این ویژگی در پلن فعلی شما در دسترس نیست
              details:
                flag: can_manage_products
                upgrade_path: /api/subscriptions/plans

    403UsageLimit:
      description: Usage limit reached
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: USAGE_LIMIT_REACHED
              message: به حداکثر تعداد مجاز رسیده‌اید
              details:
                limit_key: max_products
                current: 20
                maximum: 20
                upgrade_path: /api/subscriptions/plans

    404:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    422:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    413:
      description: File too large
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: FILE_TOO_LARGE
              message: حجم فایل بیش از حد مجاز است
              details:
                max_mb: 5

paths:

  # ═══════════════════════════════════════════════════════
  # PRODUCTS — OWNER MANAGEMENT
  # ═══════════════════════════════════════════════════════

  /businesses/{business_id}/products:
    get:
      tags: [Products]
      summary: List business products (owner view)
      description: |
        Returns all products including inactive and pending moderation.
        Sorted by created_at desc by default.
        Access level: BUSINESS_FREE (can view even without subscription).
      operationId: listProducts
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: is_active
          in: query
          schema:
            type: boolean
        - name: moderation_state
          in: query
          schema:
            type: string
          description: |
            Filter by moderation state. NOT an enum.
            Valid values from system_settings.moderation_states_json.
      responses:
        '200':
          description: Products list
          content:
            application/json:
              schema:
                type: object
                properties:
                  products:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
                  entitlement_context:
                    type: object
                    description: Current feature flags and usage relevant to products
                    properties:
                      can_manage_products:
                        type: boolean
                      max_products:
                        type: integer
                      current_product_count:
                        type: integer
        '401':
          $ref: '#/components/responses/401'
        '403':
          description: Forbidden — not owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags: [Products]
      summary: Create product
      description: |
        Feature gate: can_manage_products.
        Usage limit: max_products.
        Name max length: system_settings.product_name_max_length.
        Description max length: system_settings.product_description_max_length.
      operationId: createProduct
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  maxLength: 200
                  description: Max from system_settings.product_name_max_length
                description:
                  type: string
                  nullable: true
                  maxLength: 2000
                  description: Max from system_settings.product_description_max_length
                category_id:
                  type: string
                  format: uuid
                  nullable: true
                is_active:
                  type: boolean
                  default: true
                price:
                  type: object
                  nullable: true
                  description: |
                    Requires feature_flags.can_set_product_price = true.
                    If flag is false, price field is ignored (no error).
                  properties:
                    raw_amount:
                      type: integer
                      minimum: 0
                has_discount:
                  type: boolean
                  default: false
                  description: Requires feature_flags.can_show_product_discount = true
                discount_percent:
                  type: integer
                  nullable: true
                  minimum: 1
                  maximum: 99
                installment:
                  type: object
                  nullable: true
                  description: Requires feature_flags.can_show_product_installment = true
                  properties:
                    is_available:
                      type: boolean
                    months:
                      type: integer
                      minimum: 1
                    down_payment_amount:
                      type: integer
                      nullable: true
                    monthly_payment_amount:
                      type: integer
                      nullable: true
                    description:
                      type: string
                      nullable: true
                attributes:
                  type: object
                  additionalProperties: true
                  nullable: true
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '401':
          $ref: '#/components/responses/401'
        '403':
          description: Feature flag denied or usage limit reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                feature_denied:
                  value:
                    error:
                      code: FEATURE_FLAG_DENIED
                      message: این ویژگی در پلن فعلی شما در دسترس نیست
                      details:
                        flag: can_manage_products
                        upgrade_path: /api/subscriptions/plans
                limit_reached:
                  value:
                    error:
                      code: USAGE_LIMIT_REACHED
                      message: به حداکثر تعداد محصول رسیده‌اید
                      details:
                        limit_key: max_products
                        current: 20
                        maximum: 20
                        upgrade_path: /api/subscriptions/plans
        '422':
          $ref: '#/components/responses/422'

  /businesses/{business_id}/products/{product_id}:
    get:
      tags: [Products]
      summary: Get product (owner view)
      operationId: getProduct
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
        - $ref: '#/components/parameters/ProductIdPath'
      responses:
        '200':
          description: Product detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'

    patch:
      tags: [Products]
      summary: Update product
      description: |
        Partial update. Feature gate: can_manage_products.
        Updating price requires can_set_product_price.
        Updating discount requires can_show_product_discount.
        Updating installment requires can_show_product_installment.
        If a gated field is sent without the flag, the field is silently ignored.
      operationId: updateProduct
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
        - $ref: '#/components/parameters/ProductIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 200
                description:
                  type: string
                  nullable: true
                  maxLength: 2000
                category_id:
                  type: string
                  format: uuid
                  nullable: true
                is_active:
                  type: boolean
                price:
                  type: object
                  nullable: true
                  properties:
                    raw_amount:
                      type: integer
                      minimum: 0
                has_discount:
                  type: boolean
                discount_percent:
                  type: integer
                  nullable: true
                  minimum: 1
                  maximum: 99
                installment:
                  type: object
                  nullable: true
                  properties:
                    is_available:
                      type: boolean
                    months:
                      type: integer
                      minimum: 1
                    down_payment_amount:
                      type: integer
                      nullable: true
                    monthly_payment_amount:
                      type: integer
                      nullable: true
                    description:
                      type: string
                      nullable: true
                attributes:
                  type: object
                  additionalProperties: true
                  nullable: true
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403FeatureFlag'
        '404':
          $ref: '#/components/responses/404'
        '422':
          $ref: '#/components/responses/422'

    delete:
      tags: [Products]
      summary: Delete product
      description: Feature gate: can_manage_products. Soft-delete.
      operationId: deleteProduct
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
        - $ref: '#/components/parameters/ProductIdPath'
      responses:
        '204':
          description: Deleted
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403FeatureFlag'
        '404':
          $ref: '#/components/responses/404'

  # ── Product Images ───────────────────────────────────────────────────────

  /businesses/{business_id}/products/{product_id}/images:
    get:
      tags: [Products]
      summary: List product images
      operationId: listProductImages
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
        - $ref: '#/components/parameters/ProductIdPath'
      responses:
        '200':
          description: Images
          content:
            application/json:
              schema:
                type: object
                properties:
                  images:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductImage'
                  total:
                    type: integer
                  limit:
                    type: integer
                    description: From usage_limits.max_product_images

    post:
      tags: [Products]
      summary: Upload product image
      description: |
        Feature gate: can_upload_product_images.
        Usage limit: max_product_images (per product).
        Max file size: usage_limits.max_image_file_size_mb.
        Accepted formats: system_settings.allowed_image_formats_json.
      operationId: uploadProductImage
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
        - $ref: '#/components/parameters/ProductIdPath'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                is_cover:
                  type: boolean
                  default: false
                alt_text:
                  type: string
                  nullable: true
      responses:
        '201':
          description: Image uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductImage'
        '401':
          $ref: '#/components/responses/401'
        '403':
          description: Feature flag denied or usage limit reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          $ref: '#/components/responses/413'

  /businesses/{business_id}/products/{product_id}/images/{image_id}:
    delete:
      tags: [Products]
      summary: Delete product image
      operationId: deleteProductImage
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
        - $ref: '#/components/parameters/ProductIdPath'
        - name: image_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'

    patch:
      tags: [Products]
      summary: Update product image (cover, sort_order, alt_text)
      operationId: updateProductImage
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
        - $ref: '#/components/parameters/ProductIdPath'
        - name: image_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                is_cover:
                  type: boolean
                sort_order:
                  type: integer
                alt_text:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductImage'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'

  # ═══════════════════════════════════════════════════════
  # SERVICES — OWNER MANAGEMENT
  # ═══════════════════════════════════════════════════════

  /businesses/{business_id}/services:
    get:
      tags: [Services]
      summary: List business services (owner view)
      description: |
        Returns all services including inactive.
        Access level: BUSINESS_FREE.
      operationId: listServices
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: is_active
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Services list
          content:
            application/json:
              schema:
                type: object
                properties:
                  services:
                    type: array
                    items:
                      $ref: '#/components/schemas/Service'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
                  entitlement_context:
                    type: object
                    properties:
                      can_manage_services:
                        type: boolean
                      max_services:
                        type: integer
                      current_service_count:
                        type: integer
        '401':
          $ref: '#/components/responses/401'

    post:
      tags: [Services]
      summary: Create service
      description: |
        Feature gate: can_manage_services.
        Usage limit: max_services.
      operationId: createService
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  maxLength: 200
                description:
                  type: string
                  nullable: true
                  maxLength: 2000
                category_id:
                  type: string
                  format: uuid
                  nullable: true
                service_type:
                  type: string
                  nullable: true
                is_active:
                  type: boolean
                  default: true
                price:
                  type: object
                  nullable: true
                  properties:
                    raw_amount:
                      type: integer
                      minimum: 0
                has_discount:
                  type: boolean
                  default: false
                discount_percent:
                  type: integer
                  nullable: true
                  minimum: 1
                  maximum: 99
                installment:
                  type: object
                  nullable: true
                  properties:
                    is_available:
                      type: boolean
                    months:
                      type: integer
                      minimum: 1
                    down_payment_amount:
                      type: integer
                      nullable: true
                    monthly_payment_amount:
                      type: integer
                      nullable: true
                    description:
                      type: string
                      nullable: true
                attributes:
                  type: object
                  additionalProperties: true
                  nullable: true
      responses:
        '201':
          description: Service created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
        '401':
          $ref: '#/components/responses/401'
        '403':
          description: Feature flag denied or usage limit reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/422'

  /businesses/{business_id}/services/{service_id}:
    get:
      tags: [Services]
      summary: Get service (owner view)
      operationId: getService
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
        - $ref: '#/components/parameters/ServiceIdPath'
      responses:
        '200':
          description: Service detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'

    patch:
      tags: [Services]
      summary: Update service
      description: |
        Partial update. Feature gate: can_manage_services.
        Same field-level gate logic as products.
      operationId: updateService
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
        - $ref: '#/components/parameters/ServiceIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 200
                description:
                  type: string
                  nullable: true
                  maxLength: 2000
                category_id:
                  type: string
                  format: uuid
                  nullable: true
                service_type:
                  type: string
                  nullable: true
                is_active:
                  type: boolean
                price:
                  type: object
                  nullable: true
                  properties:
                    raw_amount:
                      type: integer
                      minimum: 0
                has_discount:
                  type: boolean
                discount_percent:
                  type: integer
                  nullable: true
                  minimum: 1
                  maximum: 99
                installment:
                  type: object
                  nullable: true
                  properties:
                    is_available:
                      type: boolean
                    months:
                      type: integer
                      minimum: 1
                    down_payment_amount:
                      type: integer
                      nullable: true
                    monthly_payment_amount:
                      type: integer
                      nullable: true
                    description:
                      type: string
                      nullable: true
                attributes:
                  type: object
                  additionalProperties: true
                  nullable: true
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Service'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403FeatureFlag'
        '404':
          $ref: '#/components/responses/404'
        '422':
          $ref: '#/components/responses/422'

    delete:
      tags: [Services]
      summary: Delete service
      description: Feature gate: can_manage_services. Soft-delete.
      operationId: deleteService
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
        - $ref: '#/components/parameters/ServiceIdPath'
      responses:
        '204':
          description: Deleted
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403FeatureFlag'
        '404':
          $ref: '#/components/responses/404'

  # ═══════════════════════════════════════════════════════
  # PUBLIC BROWSING
  # ═══════════════════════════════════════════════════════

  /businesses/{business_id}/products/public:
    get:
      tags: [ProductsPublic]
      summary: List active products on public business profile
      description: |
        Returns only active + approved products.
        is_saved populated if authenticated.
        Cache: system_settings.product_list_cache_ttl_seconds.
        Rate limit: system_settings.rate_limit_public_listing_per_ip_per_minute.
      operationId: listPublicProducts
      security: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: has_discount
          in: query
          schema:
            type: boolean
        - name: has_installment
          in: query
          schema:
            type: boolean
        - name: sort_by
          in: query
          schema:
            type: string
          description: |
            Sort key. NOT an enum — valid keys from system_settings.content_sort_options_json.
            Default: system_settings.product_default_sort.
      responses:
        '200':
          description: Public products
          headers:
            Cache-Control:
              schema:
                type: string
              example: "public, max-age=120"
          content:
            application/json:
              schema:
                type: object
                properties:
                  products:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '404':
          $ref: '#/components/responses/404'

  /businesses/{business_id}/services/public:
    get:
      tags: [ServicesPublic]
      summary: List active services on public business profile
      description: |
        Returns only active + approved services.
        Cache: system_settings.service_list_cache_ttl_seconds.
        Rate limit: system_settings.rate_limit_public_listing_per_ip_per_minute.
      operationId: listPublicServices
      security: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: has_discount
          in: query
          schema:
            type: boolean
        - name: has_installment
          in: query
          schema:
            type: boolean
        - name: sort_by
          in: query
          schema:
            type: string
          description: |
            Sort key. NOT an enum.
            Default: system_settings.service_default_sort.
      responses:
        '200':
          description: Public services
          headers:
            Cache-Control:
              schema:
                type: string
              example: "public, max-age=120"
          content:
            application/json:
              schema:
                type: object
                properties:
                  services:
                    type: array
                    items:
                      $ref: '#/components/schemas/Service'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '404':
          $ref: '#/components/responses/404'

  /products/{product_id}:
