  # ═══════════════════════════════════════════════════════
  # SAVE / BOOKMARK BY CONSUMERS
  # ═══════════════════════════════════════════════════════

  /products/{product_id}/save:
    post:
      tags: [ContentSave]
      summary: Save (bookmark) a product
      description: Idempotent. Access level: REGISTERED.
      operationId: saveProduct
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductIdPath'
      responses:
        '200':
          description: Saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  is_saved:
                    type: boolean
                    example: true
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'

    delete:
      tags: [ContentSave]
      summary: Remove product from saved
      operationId: unsaveProduct
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProductIdPath'
      responses:
        '200':
          description: Removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  is_saved:
                    type: boolean
                    example: false
        '401':
          $ref: '#/components/responses/401'

  /services/{service_id}/save:
    post:
      tags: [ContentSave]
      summary: Save (bookmark) a service
      operationId: saveService
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ServiceIdPath'
      responses:
        '200':
          description: Saved
          content:
