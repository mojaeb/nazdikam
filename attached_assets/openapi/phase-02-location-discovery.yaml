  # ════════════════════════════════════════════════════════
  # SEARCH
  # ════════════════════════════════════════════════════════

  # ────────────────────────────────────────────────────────
  # GET /search/config
  # Runtime search configuration (read from system_settings)
  # ────────────────────────────────────────────────────────
  /search/config:
    get:
      tags: [Search]
      operationId: getSearchConfig
      summary: Get search configuration
      description: |
        Returns all runtime-configurable search parameters.
        Clients MUST fetch this endpoint before rendering the search UI.
        All sort options, filter definitions, pagination limits, radius limits,
        and ranking weight key names are returned here.

        **No defaults are hardcoded in this spec.** All values come from
        system_settings at runtime and can be changed by Super Admin without
        a code deployment.

        **Authorization:** None required. Public endpoint.

        **Caching:** TTL: system_settings.search_config_cache_ttl_seconds (default: 300s).

        **Rate Limit (global per IP):**
        system_settings.rate_limit_locations_per_ip_per_minute (default: 120) per minute.
      security: []
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/AppVersion'
      responses:
        '200':
          description: Current search configuration
          headers:
            Cache-Control:
              schema:
                type: string
              example: "public, max-age=300"
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/SearchConfig'
              example:
                data:
                  default_sort: "relevance"
                  sort_options:
                    - key: "relevance"
                      label: "مرتبط‌ترین"
                      label_en: "Most Relevant"
                      is_default: true
                      requires_location: false
                    - key: "distance"
                      label: "نزدیک‌ترین"
                      label_en: "Nearest"
                      is_default: false
                      requires_location: true
                    - key: "rating"
                      label: "بالاترین امتیاز"
                      label_en: "Top Rated"
                      is_default: false
                      requires_location: false
                    - key: "recency"
                      label: "جدیدترین"
                      label_en: "Newest"
                      is_default: false
                      requires_location: false
                  filter_definitions:
                    - key: "category_id"
                      type: "uuid"
                      label: "دسته‌بندی"
                      is_required: false
                      is_location_scoped: false
                    - key: "subcategory_id"
                      type: "uuid"
                      label: "زیر دسته"
                      is_required: false
                      is_location_scoped: false
                    - key: "province_id"
                      type: "uuid"
                      label: "استان"
                      is_required: false
                      is_location_scoped: false
                    - key: "city_id"
                      type: "uuid"
                      label: "شهر"
                      is_required: false
                      is_location_scoped: false
                    - key: "is_verified"
                      type: "boolean"
                      label: "تأیید شده"
                      is_required: false
                      is_location_scoped: false
                    - key: "has_discount"
                      type: "boolean"
                      label: "دارای تخفیف"
                      is_required: false
                      is_location_scoped: false
                  pagination:
                    default_per_page: 20
                    max_per_page: 100
                  location_config:
                    default_radius_km: 10
                    min_radius_km: 1
                    max_radius_km: 100
                  text_config:
                    min_length: 2
                    max_length: 100
                  suggestion_config:
                    min_chars: 2
                    max_results: 10
                  ranking_weight_keys:
                    - key: "search_weight_text_relevance"
                      description: "وزن تطابق متن جستجو"
                    - key: "search_weight_distance"
                      description: "وزن فاصله جغرافیایی"
                    - key: "search_weight_rating"
                      description: "وزن امتیاز کسب‌وکار"
                    - key: "search_weight_recency"
                      description: "وزن تازگی محتوا"
                    - key: "search_weight_verified_boost"
                      description: "ضریب تقویت کسب‌وکار تأیید شده"
                    - key: "search_weight_subscribed_boost"
                      description: "ضریب تقویت کسب‌وکار دارای اشتراک"
                    - key: "search_weight_category_exact_match"
                      description: "ضریب تقویت تطابق دقیق دسته‌بندی"
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'

  # ────────────────────────────────────────────────────────
  # GET /search
  # Main discovery search endpoint
  # ────────────────────────────────────────────────────────
  /search:
    get:
      tags: [Search]
      operationId: search
      summary: Search and discover local businesses and content
      description: |
        Full-text and location-based search across all content types.

        ## Filtering
        All filter parameters use UUIDs — never names. Valid filter keys are
        returned by `GET /search/config` and may grow over time without breaking changes.

        ## Sorting
        `sort_by` accepts any key returned in `GET /search/config` → `sort_options`.
        The valid set is controlled by system_settings and may change.
        If an unknown `sort_by` value is provided, the server uses `default_sort`
        from system_settings.search_default_sort.

        ## Ranking Weights
        All relevance scoring weights are read from system_settings.search_weight_*
        at query time. No weight is hardcoded. Super Admin can adjust rankings via
        the system_settings panel without a code deployment.

        Current weight keys (subject to change via system_settings):
        - system_settings.search_weight_text_relevance (text match score component)
        - system_settings.search_weight_distance (proximity score component)
        - system_settings.search_weight_rating (business rating score component)
        - system_settings.search_weight_recency (content recency score component)
        - system_settings.search_weight_verified_boost (multiplier for verified businesses)
        - system_settings.search_weight_subscribed_boost (multiplier for subscribed businesses)
        - system_settings.search_weight_category_exact_match (multiplier for exact category match)

        ## Pagination
        - Default page size: system_settings.search_default_per_page (default: 20)
        - Maximum page size: system_settings.search_max_per_page (default: 100)

        ## Location-based Search
        Provide `lat` and `lng` to enable:
        - Distance calculation per result (`distance_km` field)
        - Radius filtering (`radius_km`)
        - Distance-based sorting (`sort_by=distance`)

        Radius limits from system_settings:
        - Minimum: system_settings.search_min_radius_km (default: 1)
        - Maximum: system_settings.search_max_radius_km (default: 100)
        - Default (when lat/lng provided but no radius): system_settings.search_default_radius_km (default: 10)

        ## Extensible Filters
        Beyond the named filter parameters, a `filters` JSON string may be provided
        for advanced filtering. Unknown filter keys are silently ignored by the current
        server version, allowing new filter fields to be added without client breaks.

        **Authorization:** None required. Authenticated users get personalised ranking
        (e.g. saved-business boost). Guest searches are ranked by general signals only.

        **Text Constraints:**
        - Min length: system_settings.search_text_min_length (default: 2)
        - Max length: system_settings.search_text_max_length (default: 100)

        **Rate Limit (per user/IP):**
        system_settings.rate_limit_search_per_user_per_minute (default: 30) per minute.
      security:
        - {}
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/AppVersion'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: |
            Free-text search query.
            Min length: system_settings.search_text_min_length (default: 2).
            Max length: system_settings.search_text_max_length (default: 100).
            Persian and Latin characters accepted.
        - name: category_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: |
            Filter by category UUID. Obtain valid UUIDs from GET /categories.
            NEVER use category names as identifiers.
        - name: subcategory_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: |
            Filter by subcategory UUID (depth-1 category).
            NEVER use subcategory names as identifiers.
            If subcategory_id is provided without category_id, the server derives
            category_id automatically from the subcategory's parent_id.
        - name: province_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: |
            Filter by province UUID. Obtain valid UUIDs from GET /locations/provinces.
            NEVER use province names as identifiers.
        - name: city_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: |
            Filter by city UUID. Obtain valid UUIDs from GET /locations/cities.
            NEVER use city names as identifiers.
            If city_id is provided without province_id, the server derives province_id
            automatically from the city's province.
        - name: content_type
          in: query
          required: false
          schema:
            type: string
          description: |
            Filter by content type. NOT an enum — valid values are returned in
            GET /search/config → filter_definitions and may expand over time.
            Current known values: "business". Future: "product", "service", "discount", etc.
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
          description: |
            Sort order key. NOT an enum — valid values returned in
            GET /search/config → sort_options. If unrecognised, falls back to
            system_settings.search_default_sort.
        - name: lat
          in: query
          required: false
          schema:
            type: number
            format: double
            minimum: -90
            maximum: 90
          description: |
            Searcher's latitude (decimal degrees, WGS-84).
            Required together with `lng` for distance-based features.
        - name: lng
          in: query
          required: false
          schema:
            type: number
            format: double
            minimum: -180
            maximum: 180
          description: |
            Searcher's longitude (decimal degrees, WGS-84).
            Required together with `lat` for distance-based features.
        - name: radius_km
          in: query
          required: false
          schema:
            type: number
            format: double
          description: |
            Search radius in kilometres. Only used when lat/lng is provided.
            Min: system_settings.search_min_radius_km (default: 1).
            Max: system_settings.search_max_radius_km (default: 100).
            Default (when omitted): system_settings.search_default_radius_km (default: 10).
        - name: filters
          in: query
          required: false
          schema:
            type: string
          description: |
            JSON-encoded object of additional filter key-value pairs.
            Used for filter fields that are not yet represented as named query params.
            Unknown keys are silently ignored by current server version.
            Allows Super Admin to activate new filters via system_settings
            without requiring a client update.
            Example: `{"has_discount": true, "min_rating": 4}`
      responses:
        '200':
          description: Search results with pagination metadata
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SearchResultItem'
                  meta:
                    allOf:
                      - $ref: '#/components/schemas/PaginationMeta'
                      - type: object
                        properties:
                          query:
                            type: string
                            nullable: true
                            description: The normalised search query (after server-side processing)
                          applied_filters:
                            type: object
                            additionalProperties: true
                            description: The filters actually applied (after server normalisation)
                          location_used:
                            $ref: '#/components/schemas/GeoPoint'
                            description: The coordinates used for distance calculations (if any)
                          radius_km_used:
                            type: number
                            nullable: true
                            description: The radius applied (null if no location was provided)
                          sort_applied:
                            type: string
                            description: The sort key actually used after fallback resolution
              example:
                data:
                  - id: "b8c9d0e1-f2a3-4567-bcde-888888888888"
                    type: "business"
                    title: "کافه باران"
                    subtitle: "ساری، مازندران"
                    description_snippet: "کافه‌ای دنج در مرکز شهر با منوی متنوع..."
                    thumbnail_url: "https://cdn.nazdikam.ir/businesses/cafe-baran.jpg"
                    province_id: "a1b2c3d4-e5f6-7890-abcd-111111111111"
                    city_id: "c3d4e5f6-a7b8-9012-cdef-333333333333"
                    category_id: "e5f6a7b8-c9d0-1234-efab-555555555555"
                    subcategory_id: "a7b8c9d0-e1f2-3456-abcd-777777777777"
                    distance_km: 1.2
                    score: 0.87
                    is_verified: true
                    has_active_subscription: true
                    payload:
                      business_id: "b8c9d0e1-f2a3-4567-bcde-888888888888"
                      rating: 4.6
                      review_count: 34
                      address_snippet: "خیابان ملت، پلاک ۱۲"
                meta:
                  page: 1
                  per_page: 20
                  total: 47
                  total_pages: 3
                  has_next: true
                  has_prev: false
                  query: "کافه"
                  applied_filters:
                    city_id: "c3d4e5f6-a7b8-9012-cdef-333333333333"
                  location_used:
                    lat: 36.5657
                    lng: 53.0588
                  radius_km_used: 10
                  sort_applied: "relevance"
        '400':
          description: Validation error (invalid UUID format, radius out of range, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_uuid:
                  value:
                    error:
                      code: VALIDATION_ERROR
                      message: "شناسه ارسال شده معتبر نیست"
                radius_out_of_range:
                  value:
                    error:
                      code: VALIDATION_ERROR
                      message: "محدوده جستجو خارج از بازه مجاز است"
                      details:
                        field: "radius_km"
                        min: 1
                        max: 100
                query_too_short:
                  value:
                    error:
                      code: QUERY_TOO_SHORT
                      message: "عبارت جستجو خیلی کوتاه است"
                      details:
                        min_length: 2
                lat_without_lng:
                  value:
                    error:
                      code: VALIDATION_ERROR
                      message: "lat و lng باید هر دو یا هیچ‌کدام ارسال شوند"
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'

  # ────────────────────────────────────────────────────────
  # GET /search/suggestions
  # Autocomplete / typeahead suggestions
  # ────────────────────────────────────────────────────────
  /search/suggestions:
    get:
      tags: [Search]
      operationId: getSearchSuggestions
      summary: Get search autocomplete suggestions
      description: |
        Returns ranked autocomplete suggestions as the user types.
        Used for typeahead dropdowns in the search bar.

        **Suggestion types** are NOT hardcoded enums — the set of types is defined
        by system_settings and may expand. Current types include: "business_name",
        "category", "city". Future types: "product_name", "service_name", etc.

        **Minimum characters to trigger:**
        system_settings.search_suggestion_min_chars (default: 2).
        If `q` is below this threshold, returns an empty array (not an error).

        **Maximum results:**
        system_settings.search_suggestion_max_results (default: 10).

        **Ranking:** Suggestions are ranked by relevance and popularity.
        Ranking adjustments may be applied via system_settings.search_weight_* keys.

        **Authorization:** None required. Public endpoint.

        **Rate Limit (per user/IP):**
        system_settings.rate_limit_suggestions_per_user_per_minute (default: 60) per minute.
      security:
        - {}
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/AppVersion'
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Partial search query. Suggestions returned when length ≥ system_settings.search_suggestion_min_chars.
        - name: province_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Bias suggestions toward this province (UUIDs only, from GET /locations/provinces)
        - name: city_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Bias suggestions toward this city (UUIDs only, from GET /locations/cities)
        - name: category_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Bias suggestions toward this category (UUIDs only, from GET /categories)
      responses:
        '200':
          description: Autocomplete suggestions (empty array if below min_chars threshold)
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SuggestionItem'
                  meta:
                    type: object
                    properties:
                      query:
                        type: string
                      total:
                        type: integer
              example:
                data:
                  - id: "b8c9d0e1-f2a3-4567-bcde-888888888888"
                    type: "business_name"
                    label: "کافه باران"
                    metadata:
                      city_name: "ساری"
                      category_name: "رستوران و کافه"
                  - id: "e5f6a7b8-c9d0-1234-efab-555555555555"
                    type: "category"
                    label: "رستوران و کافه"
                    metadata:
                      business_count: 142
                  - id: "c3d4e5f6-a7b8-9012-cdef-333333333333"
                    type: "city"
                    label: "ساری"
                    metadata:
                      province_name: "مازندران"
                meta:
                  query: "کافه"
                  total: 3
        '400':
          description: Query parameter missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: VALIDATION_ERROR
                  message: "پارامتر q الزامی است"
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'

# ─────────────────────────────────────────────────────────
# SECTION 4 — AUTHORIZATION RULES SUMMARY
# ─────────────────────────────────────────────────────────
# Endpoint                     | Guest | RegUser | BizOwner | Admin
# ──────────────────────────── | ───── | ─────── | ──────── | ─────
# GET  /locations/provinces    |  ✅   |   ✅   |    ✅    |  ✅  (admin: can request include_inactive=true)
# GET  /locations/provinces:id |  ✅   |   ✅   |    ✅    |  ✅
# GET  /locations/cities       |  ✅   |   ✅   |    ✅    |  ✅  (admin: can request include_inactive=true)
# GET  /locations/cities/:id   |  ✅   |   ✅   |    ✅    |  ✅
# GET  /categories             |  ✅   |   ✅   |    ✅    |  ✅  (admin: can request include_inactive=true)
# GET  /categories/tree        |  ✅   |   ✅   |    ✅    |  ✅
# GET  /categories/:id         |  ✅   |   ✅   |    ✅    |  ✅
# GET  /search/config          |  ✅   |   ✅   |    ✅    |  ✅
# GET  /search                 |  ✅   |   ✅   |    ✅    |  ✅  (auth: personalised ranking)
# GET  /search/suggestions     |  ✅   |   ✅   |    ✅    |  ✅
#
# ─────────────────────────────────────────────────────────
# SECTION 5 — RATE LIMIT SUMMARY
# All limits are runtime-configurable via system_settings.
# Values below are defaults only — no code change required to adjust.
# ─────────────────────────────────────────────────────────
# Endpoint                     | system_settings key (limit)                       | Default | Window | Key by
# ──────────────────────────── | ───────────────────────────────────────────────── | ─────── | ────── | ──────────────
# GET  /locations/provinces    | rate_limit_locations_per_ip_per_minute            | 120     | 1 min  | IP address
# GET  /locations/provinces:id | rate_limit_locations_per_ip_per_minute            | 120     | 1 min  | IP address
# GET  /locations/cities       | rate_limit_locations_per_ip_per_minute            | 120     | 1 min  | IP address
# GET  /locations/cities/:id   | rate_limit_locations_per_ip_per_minute            | 120     | 1 min  | IP address
# GET  /categories             | rate_limit_categories_per_ip_per_minute           | 120     | 1 min  | IP address
# GET  /categories/tree        | rate_limit_categories_per_ip_per_minute           | 120     | 1 min  | IP address
# GET  /categories/:id         | rate_limit_categories_per_ip_per_minute           | 120     | 1 min  | IP address
# GET  /search/config          | rate_limit_locations_per_ip_per_minute            | 120     | 1 min  | IP address
# GET  /search                 | rate_limit_search_per_user_per_minute             | 30      | 1 min  | user/IP
# GET  /search/suggestions     | rate_limit_suggestions_per_user_per_minute        | 60      | 1 min  | user/IP
#
# ─────────────────────────────────────────────────────────
# SECTION 6 — CANONICAL SYSTEM_SETTINGS KEYS FOR PHASE 2
# All keys below must be seeded in system_settings at DB initialisation.
# No defaults are hardcoded in application code.
# ─────────────────────────────────────────────────────────
# KEY                                    | DEFAULT | TYPE    | DESCRIPTION
# ────────────────────────────────────── | ─────── | ─────── | ───────────────────────────────────────
# location_province_cache_ttl_seconds    | 3600    | integer | Cache TTL for province list
# location_city_cache_ttl_seconds        | 3600    | integer | Cache TTL for city list
# category_tree_cache_ttl_seconds        | 1800    | integer | Cache TTL for category tree
# search_config_cache_ttl_seconds        | 300     | integer | Cache TTL for /search/config
# search_default_sort                    | relevance | string | Default sort key
# search_default_per_page                | 20      | integer | Default page size
# search_max_per_page                    | 100     | integer | Maximum allowed page size
# search_default_radius_km               | 10      | number  | Default search radius (km)
# search_min_radius_km                   | 1       | number  | Minimum allowed radius (km)
# search_max_radius_km                   | 100     | number  | Maximum allowed radius (km)
# search_text_min_length                 | 2       | integer | Minimum characters for text search
# search_text_max_length                 | 100     | integer | Maximum characters for text search
# search_suggestion_min_chars            | 2       | integer | Minimum chars to trigger suggestions
# search_suggestion_max_results          | 10      | integer | Maximum suggestion results
# search_weight_text_relevance           | 0.40    | decimal | Weight: text match score component
# search_weight_distance                 | 0.30    | decimal | Weight: proximity score component
# search_weight_rating                   | 0.20    | decimal | Weight: business rating component
# search_weight_recency                  | 0.10    | decimal | Weight: content recency component
# search_weight_verified_boost           | 1.20    | decimal | Multiplier for verified businesses
# search_weight_subscribed_boost         | 1.15    | decimal | Multiplier for subscribed businesses
# search_weight_category_exact_match     | 1.30    | decimal | Multiplier for exact category match
# rate_limit_search_per_user_per_minute  | 30      | integer | Search rate limit per user/IP per min
# rate_limit_suggestions_per_user_per_minute | 60  | integer | Suggestion rate limit per user/IP per min
# rate_limit_locations_per_ip_per_minute | 120     | integer | Location endpoint rate limit per IP per min
# rate_limit_categories_per_ip_per_minute| 120     | integer | Category endpoint rate limit per IP per min
#
# ─────────────────────────────────────────────────────────
# SECTION 7 — CMS GUARDRAIL ENFORCEMENT
# ─────────────────────────────────────────────────────────
# PROVINCE NAMES:    Not present in any enum. Not usable as identifiers. DB-backed only.
# CITY NAMES:        Not present in any enum. Not usable as identifiers. DB-backed only.
# CATEGORY NAMES:    Not present in any enum. Not usable as identifiers. DB-backed only.
# SUBCATEGORY NAMES: Not present in any enum. Not usable as identifiers. DB-backed only.
# SORT KEYS:         Not hardcoded enum. Defined entirely by system_settings.
# FILTER KEYS:       Not hardcoded enum. Defined entirely by system_settings.
# CONTENT TYPES:     Not hardcoded enum. Extensible string field.
# RANKING WEIGHTS:   Not present in API responses. system_settings namespace only.
# PAGINATION LIMITS: system_settings.search_default_per_page / search_max_per_page.
# RADIUS LIMITS:     system_settings.search_min/default/max_radius_km.
# CACHE TTLs:        All per-resource system_settings keys (location/category/search_config).
