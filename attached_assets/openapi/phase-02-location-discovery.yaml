  # CATEGORIES
  # ══════════════════════════════════════════════════════

  # ────────────────────────────────────────────────────────
  # GET /categories
  # List categories (root or children of a parent)
  # ────────────────────────────────────────────────────────
  /categories:
    get:
      tags: [Categories]
      operationId: listCategories
      summary: List categories
      description: |
        Returns categories in display order (sort_order ASC, then name ASC).

        **Without `parent_id`:** returns root categories (depth 0) only.
        **With `parent_id`:** returns subcategories (depth 1) of that parent.

        For the full category tree in a single request, use `GET /categories/tree`.

        **CMS Note:** Category records are managed exclusively by Super Admin.
        No category name or ID is hardcoded in this API. The response is the
        single source of truth for valid category identifiers.

        **Authorization:** None required. Public endpoint.

        **Caching:** TTL: system_settings.category_tree_cache_ttl_seconds (default: 1800s).

        **Rate Limit (global per IP):**
        system_settings.rate_limit_categories_per_ip_per_minute (default: 120) per minute.
      security: []
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - $ref: '#/components/parameters/AppVersion'
        - name: parent_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: |
            When provided, returns subcategories of this parent.
            When omitted, returns root categories (depth 0).
        - name: include_inactive
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: When true, includes inactive categories. Requires super_admin role.
      responses:
        '200':
          description: Ordered list of categories
          headers:
            Cache-Control:
              schema:
                type: string
              example: "public, max-age=1800"
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CategorySummary'
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                      parent_id:
                        type: string
                        format: uuid
                        nullable: true
                      cached_at:
                        type: string
                        format: date-time
              example:
                data:
                  - id: "e5f6a7b8-c9d0-1234-efab-555555555555"
                    name: "رستوران و کافه"
                    name_en: "Restaurants & Cafes"
                    slug: "restaurants-cafes"
                    parent_id: null
                    depth: 0
                    icon_url: "https://cdn.nazdikam.ir/categories/restaurant-icon.svg"
                    color: "#FF5722"
                    is_active: true
                    sort_order: 1
                    business_count: 142
                  - id: "f6a7b8c9-d0e1-2345-fabc-666666666666"
                    name: "خدمات زیبایی"
                    name_en: "Beauty Services"
                    slug: "beauty-services"
                    parent_id: null
                    depth: 0
                    icon_url: "https://cdn.nazdikam.ir/categories/beauty-icon.svg"
                    color: "#E91E63"
                    is_active: true
                    sort_order: 2
                    business_count: 89
                meta:
                  total: 12
                  parent_id: null
                  cached_at: "2026-06-10T08:00:00Z"
        '400':
          description: Invalid parent_id format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: VALIDATION_ERROR
                  message: "شناسه دسته‌بندی معتبر نیست"
        '403':
          description: include_inactive=true requested by non-admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: FORBIDDEN
                  message: "دسترسی به این بخش مجاز نیست"
        '404':
          description: parent_id provided but not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: CATEGORY_NOT_FOUND
                  message: "دسته‌بندی یافت نشد"
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'

