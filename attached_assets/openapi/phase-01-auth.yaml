                    is_current: true
                    created_at: "2026-06-10T08:30:00Z"
                    created_at_jalali: "۲۰ خرداد ۱۴۰۵"
                    last_activity_at: "2026-06-10T11:00:00Z"
                    last_activity_at_jalali: "۲۰ خرداد ۱۴۰۵"
                  - id: "d8b2c3e4-f5a6-7890-bcde-f01234567890"
                    device_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    device_name: "Chrome on Windows 11"
                    platform: web
                    browser: "Chrome 124"
                    app_version: "1.0.0"
