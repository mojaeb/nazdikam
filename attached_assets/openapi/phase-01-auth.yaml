                  code: NOT_IMPLEMENTED
                  message: "این امکان در نسخه آینده در دسترس خواهد بود"

  # ────────────────────────────────────────────────────────
  # DELETE /auth/sessions/:id
  # RESERVED — Future user-controlled session revocation
  # ────────────────────────────────────────────────────────
  /auth/sessions/{session_id}:
    delete:
      tags: [Auth]
      operationId: revokeSession
      summary: "[RESERVED] Revoke a specific session"
      description: |
        **⚠️ RESERVED ENDPOINT — Not yet implemented.**

        When implemented, allows the authenticated user to revoke any of their
        active sessions by `session_id` (obtained from `GET /auth/sessions`).

        **Planned behaviour:**
        - Immediately invalidates the refresh token for the target session.
        - Adds the associated access token's `jti` to the revocation list
          until its natural expiry.
        - If the session being revoked is the current session, equivalent to logout.
        - Cannot revoke another user's sessions — server verifies ownership.

        **Authorization (planned):** Bearer token required.

        **Rate Limit (planned):** 20 requests per user per hour.
      security:
        - BearerAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The session ID to revoke (from GET /auth/sessions or AuthToken.session_id)
        - $ref: '#/components/parameters/AppVersion'
      responses:
        '200':
          description: Session revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                      revoked_session_id:
                        type: string
                        format: uuid
              example:
                data:
                  message: "نشست با موفقیت خاتمه یافت"
                  revoked_session_id: "d8b2c3e4-f5a6-7890-bcde-f01234567890"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Session does not belong to the current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: FORBIDDEN
                  message: "دسترسی به این نشست مجاز نیست"
        '404':
          description: Session not found or already revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: SESSION_NOT_FOUND
                  message: "نشست یافت نشد یا قبلاً خاتمه یافته"
        '501':
          description: Not yet implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: NOT_IMPLEMENTED
                  message: "این امکان در نسخه آینده در دسترس خواهد بود"

# ─────────────────────────────────────────────────────────
# SECTION 4 — AUTHORIZATION RULES SUMMARY
# (non-path documentation)
# ─────────────────────────────────────────────────────────
# Endpoint                       | Guest | RegUser | BizOwner | Admin
# ────────────────────────────── | ───── | ─────── | ──────── | ─────
# POST /auth/otp/request         |  ✅   |   ✅   |    ✅    |  ✅
# POST /auth/otp/verify          |  ✅   |   ✅   |    ✅    |  ✅
# POST /auth/token/refresh       |  ✅   |   ✅   |    ✅    |  ✅
# POST /auth/logout              |  ❌   |   ✅   |    ✅    |  ✅
# GET  /auth/me                  |  ❌   |   ✅   |    ✅    |  ✅
# PATCH /auth/me                 |  ❌   |   ✅   |    ✅    |  ✅
# POST /auth/me/avatar           |  ❌   |   ✅   |    ✅    |  ✅
# GET  /auth/permissions         |  ❌   |   ✅   |    ✅    |  ✅
# GET  /auth/sessions            |  ❌   |   ✅   |    ✅    |  ✅  [RESERVED]
# DELETE /auth/sessions/:id      |  ❌   |   ✅   |    ✅    |  ✅  [RESERVED]
#
# ─────────────────────────────────────────────────────────
# SECTION 5 — RATE LIMIT SUMMARY
# ─────────────────────────────────────────────────────────
# Endpoint                       | Window   | Limit  | Key
# ────────────────────────────── | ──────── | ────── | ──────────────
# POST /auth/otp/request         | 10 min   | 5      | mobile number
# POST /auth/otp/request         | 1 min    | 60     | IP address
# POST /auth/otp/verify          | 10 min   | 10     | mobile number
# POST /auth/otp/verify          | 1 min    | 60     | IP address
# POST /auth/token/refresh       | 1 hour   | 20     | refresh token
# POST /auth/logout              | 1 min    | 10     | user ID
# GET  /auth/me                  | 1 min    | 60     | user ID
# PATCH /auth/me                 | 1 hour   | 20     | user ID
# POST /auth/me/avatar           | 1 hour   | 10     | user ID
# GET  /auth/permissions         | 1 min    | 60     | user ID
# GET  /auth/sessions            | 1 hour   | 30     | user ID         [RESERVED]
# DELETE /auth/sessions/:id      | 1 hour   | 20     | user ID         [RESERVED]
#
# ─────────────────────────────────────────────────────────
# SECTION 6 — NEW SCHEMAS ADDED IN REVIEW AMENDMENTS
# ─────────────────────────────────────────────────────────
# DeviceInfo     — login request device metadata (all optional)
# DeviceSession  — session record shape (for future GET /auth/sessions)
#
# FIELDS ADDED TO EXISTING SCHEMAS:
# AuthToken      — + session_id (UUID linking token to device session)
# UserProfile    — + deletion_requested_at (nullable timestamp)
#                — + deleted_at (nullable timestamp)
#
# PARAMETERS ADDED:
# AppVersion     — X-App-Version header (optional, semver, all endpoints)
#
# RESERVED ENDPOINTS:
# GET  /auth/sessions       — list user's active sessions
# DELETE /auth/sessions/:id — revoke a specific session
