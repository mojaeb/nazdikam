                    last_activity_at_jalali: "۱۹ خرداد ۱۴۰۵"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '501':
          description: Not yet implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
