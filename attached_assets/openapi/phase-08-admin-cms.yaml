      operationId: adminListBanners
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: placement
          in: query
          schema:
            type: string
          description: NOT an enum. Valid values from system_settings.banner_placement_keys_json.
        - name: is_active
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Banners
          content:
            application/json:
              schema:
                type: object
                properties:
                  banners:
                    type: array
                    items:
                      $ref: '#/components/schemas/Banner'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
                  available_placements:
                    type: array
                    items:
                      type: string
                    description: |
                      From system_settings.banner_placement_keys_json.
                      Client uses to populate placement selector.
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'

    post:
      tags: [AdminBanners]
      summary: Create banner
      operationId: adminCreateBanner
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [title, image, placement]
              properties:
                title:
                  type: string
                image:
                  type: string
                  format: binary
                link_url:
                  type: string
                  format: uri
                  nullable: true
                placement:
                  type: string
                  description: NOT an enum. From system_settings.banner_placement_keys_json.
                is_active:
                  type: boolean
                  default: true
                sort_order:
                  type: integer
                  default: 0
                starts_at:
                  type: string
                  format: date-time
                  nullable: true
                ends_at:
                  type: string
                  format: date-time
                  nullable: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Banner'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '422':
          $ref: '#/components/responses/422'

  /admin/banners/{banner_id}:
    put:
      tags: [AdminBanners]
      summary: Update banner
      operationId: adminUpdateBanner
      parameters:
        - name: banner_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                link_url:
                  type: string
                  format: uri
                  nullable: true
                placement:
                  type: string
                is_active:
                  type: boolean
                sort_order:
                  type: integer
                starts_at:
                  type: string
                  format: date-time
                  nullable: true
                ends_at:
                  type: string
                  format: date-time
                  nullable: true
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Banner'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'

    delete:
      tags: [AdminBanners]
      summary: Delete banner
      operationId: adminDeleteBanner
      parameters:
        - name: banner_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'

  # ═══════════════════════════════════════════════════════
  # PLATFORM ANALYTICS (ADMIN)
  # ═══════════════════════════════════════════════════════

  /admin/analytics/overview:
    get:
      tags: [AdminAnalytics]
      summary: Platform-wide analytics overview
      description: |
        KPI dashboard for Super Admin. All metrics are extensible — NOT hardcoded.
        Date range from system_settings.admin_analytics_default_range_days.
      operationId: adminGetAnalyticsOverview
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Platform overview
          content:
            application/json:
              schema:
                type: object
                properties:
                  date_range:
                    type: object
                    properties:
                      from:
                        type: string
                        format: date
                      to:
                        type: string
                        format: date
                  kpis:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        value:
                          type: integer
                        change_percent:
                          type: number
                          nullable: true
                    description: |
                      Keys are KPI names (NOT enum).
                      Known KPIs: "total_users", "total_businesses", "active_subscriptions",
                      "new_registrations", "total_revenue", "page_views".
                  revenue:
                    type: object
                    properties:
                      total:
                        type: integer
                      by_plan:
                        type: object
                        additionalProperties:
                          type: integer
                        description: Keys are plan UUIDs (NOT plan names)
                  subscription_stats:
                    type: object
                    additionalProperties: true
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'

  /admin/analytics/subscriptions:
    get:
      tags: [AdminAnalytics]
      summary: Subscription revenue report
      description: |
        Subscription purchase history and revenue aggregation.
        All aggregation windows from system_settings.analytics_windows_json.
      operationId: adminGetSubscriptionReport
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: window
          in: query
          schema:
            type: string
          description: NOT an enum.
        - name: plan_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by specific plan
      responses:
        '200':
          description: Subscription revenue report
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
