openapi: 3.1.0

info:
  title: Nazdikam API
  version: 1.0.0
  description: |
    نزدیکام — Phase 8: Admin CMS
    Persian RTL · Mobile-first · Location-based · Northern Iran

    ## Coverage
    Plan management, category management, province/city management,
    discount code management, referral configuration, system settings,
    moderation, user management, business management, and banner management.

    ## Architecture Guardrails
    - All business rules configurable through Admin CMS — NO hardcoded operational values
    - Plan CRUD: plan names are arbitrary strings — NO enum for plan type/tier
    - system_settings: all keys are managed here — NO hardcoded values in code
    - Category depth: validated against system_settings.category_max_depth
    - Moderation states: defined in system_settings.moderation_states_json
    - Contact method types: defined in system_settings.contact_method_types_json
    - Analytics windows: defined in system_settings.analytics_windows_json
    - Payment gateway: configured via system_settings
    - All admin endpoints require Super Admin role (BearerAuth + admin claim)

    ## Authentication
    All admin endpoints require:
    - BearerAuth JWT with admin claim
    - 403 ADMIN_REQUIRED if non-admin accesses these endpoints

servers:
  - url: /api
    description: Shared proxy — all paths prefixed with /api

tags:
  - name: AdminPlans
    description: Subscription plan CMS
  - name: AdminCategories
    description: Category and subcategory management
  - name: AdminLocations
    description: Province and city management
  - name: AdminDiscountCodes
    description: Discount code management
  - name: AdminReferral
    description: Referral program configuration
  - name: AdminSystemSettings
    description: System settings management
  - name: AdminModeration
    description: Content moderation queue
  - name: AdminUsers
    description: User account management
  - name: AdminBusinesses
    description: Business management and approval
  - name: AdminBanners
    description: Banner and advertisement management
  - name: AdminAnalytics
    description: Platform-wide analytics and reports

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT with admin claim.
        All admin endpoints return 403 ADMIN_REQUIRED if the claim is absent.

  schemas:

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true

    PaginationMeta:
      type: object
      required: [page, per_page, total, total_pages]
      properties:
        page:
          type: integer
          minimum: 1
        per_page:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        total_pages:
          type: integer
          minimum: 0

    AdminPlanWrite:
      type: object
      description: |
        Plan creation/update payload.
        All names are arbitrary strings — NO enum for plan tier.
        feature_flags and usage_limits keys must match the Feature Flag Matrix
        and Usage Limits Catalog respectively. Unknown keys are accepted and stored.
      properties:
        name:
          type: string
          description: Arbitrary plan display name (Persian). NOT an enum.
          maxLength: 100
        slug:
          type: string
          description: URL-safe slug. Must be unique. NOT an enum.
          maxLength: 50
        description:
          type: string
          nullable: true
        short_description:
          type: string
          nullable: true
        is_active:
          type: boolean
          default: false
        is_featured:
          type: boolean
          default: false
        price:
          type: object
          required: [raw_amount]
          properties:
            raw_amount:
              type: integer
              minimum: 0
        original_price:
          type: object
          nullable: true
          properties:
            raw_amount:
              type: integer
              minimum: 0
        duration_value:
          type: integer
          minimum: 1
        duration_unit:
          type: string
          description: |
            NOT an enum. Valid values from system_settings.subscription_duration_units_json.
        duration_label:
          type: string
        feature_flags:
          type: object
          additionalProperties:
            type: boolean
          description: |
            All 23 feature flag keys. Unknown keys accepted and stored.
            Missing keys treated as false by business entitlement checks.
        usage_limits:
          type: object
          additionalProperties:
            type: integer
          description: |
            All usage limit keys. -1 = unlimited. Unknown keys accepted.
            Missing keys treated as 0 by business entitlement checks.
        highlights:
          type: array
          items:
            type: string
        sort_order:
          type: integer
        color:
          type: string
          nullable: true
        badge_text:
          type: string
          nullable: true

    SystemSetting:
      type: object
      required: [key, value, data_type, description]
      properties:
        key:
          type: string
          description: Setting key (snake_case)
        value:
          type: string
          description: |
            Raw string value. Interpreted according to data_type.
            JSON values stored as strings (parsed by server).
        data_type:
          type: string
          description: |
            NOT an enum. Known types: "string", "integer", "float", "boolean",
            "json_array", "json_object".
        description:
          type: string
          description: Human-readable description for Admin UI
        is_sensitive:
          type: boolean
          description: |
            If true, value is masked in GET responses (only writable, not readable).
            Example: payment_callback_secret_key.
        group:
          type: string
          nullable: true
          description: |
            Setting group for Admin UI organisation. NOT an enum.
            Known groups: "rate_limits", "search", "media", "subscriptions",
            "analytics", "moderation", "platform", "referral", "payments".
        updated_at:
          type: string
          format: date-time
        updated_by:
          type: string
          format: uuid
          nullable: true

    ModerationItem:
      type: object
      required: [id, content_type, content_id, current_state, created_at]
      properties:
        id:
          type: string
          format: uuid
        content_type:
          type: string
          description: |
            NOT an enum. Known values: "business", "product", "service",
            "video", "announcement", "verification".
        content_id:
          type: string
          format: uuid
        content_preview:
          type: object
          additionalProperties: true
          description: |
            Summary of the content for admin display.
            Shape depends on content_type.
        current_state:
          type: string
          description: NOT an enum. From system_settings.moderation_states_json.
        priority:
          type: string
          description: |
            NOT an enum. Known values: "urgent", "normal", "low".
            Default from system_settings.moderation_default_priority.
        assigned_to:
          type: string
          format: uuid
          nullable: true
          description: Admin user ID
        reporter_user_id:
          type: string
          format: uuid
          nullable: true
        report_reason:
          type: string
          nullable: true
        admin_note:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time
          nullable: true

    AdminUserSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        mobile:
          type: string
          description: Masked for privacy (e.g. "09123***456")
        full_name:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        status:
          type: string
          description: NOT an enum. Known values: "active", "blocked", "deleted".
        business_count:
          type: integer
        registered_at:
          type: string
          format: date-time
        last_login_at:
          type: string
          format: date-time
          nullable: true

    AdminBusinessSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        owner_id:
          type: string
          format: uuid
        owner_name:
          type: string
          nullable: true
        status:
          type: string
          description: NOT an enum. Known values: "draft", "pending_review", "active", "suspended", "rejected", "deleted".
        category_name:
          type: string
          nullable: true
        city_name:
          type: string
          nullable: true
        verification_status:
          type: string
          description: NOT an enum.
        is_subscribed:
          type: boolean
        subscription_expires_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    Banner:
      type: object
      required: [id, title, image_url, placement, is_active]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        image_url:
          type: string
          format: uri
        link_url:
          type: string
          format: uri
          nullable: true
        placement:
          type: string
          description: |
            Banner placement position. NOT an enum.
            Valid values from system_settings.banner_placement_keys_json.
            Known initial placements: "homepage_hero", "homepage_middle",
            "category_top", "search_results_top".
        is_active:
          type: boolean
        starts_at:
          type: string
          format: date-time
          nullable: true
        ends_at:
          type: string
          format: date-time
          nullable: true
        sort_order:
          type: integer
        click_count:
          type: integer
        impression_count:
          type: integer
        created_at:
          type: string
          format: date-time

  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1

    PerPageParam:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 20

  responses:
    401:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    403:
      description: Forbidden — not Super Admin
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: ADMIN_REQUIRED
              message: دسترسی فقط برای مدیران سیستم مجاز است

    404:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    422:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

paths:

  # ═══════════════════════════════════════════════════════
  # PLAN MANAGEMENT
  # ═══════════════════════════════════════════════════════

  /admin/subscriptions/plans:
    get:
      tags: [AdminPlans]
      summary: List all plans (active + inactive)
      operationId: adminListPlans
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: is_active
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: All plans
          content:
            application/json:
              schema:
                type: object
                properties:
                  plans:
                    type: array
                    items:
                      $ref: '#/components/schemas/AdminPlanWrite'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'

    post:
      tags: [AdminPlans]
      summary: Create subscription plan
      description: |
        Creates a new CMS-driven subscription plan.
        No plan tier enum — name is arbitrary.
        Inactive by default (is_active: false) until explicitly activated.
      operationId: adminCreatePlan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminPlanWrite'
      responses:
        '201':
          description: Plan created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminPlanWrite'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '422':
          $ref: '#/components/responses/422'

  /admin/subscriptions/plans/{plan_id}:
    get:
      tags: [AdminPlans]
      summary: Get plan detail
      operationId: adminGetPlan
      parameters:
        - name: plan_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Plan detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminPlanWrite'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'

    put:
      tags: [AdminPlans]
      summary: Update subscription plan (full replace)
      description: |
        Full replacement update. Changes do NOT retroactively affect active subscriptions
        (those use plan_snapshot). Only affects new purchases.
      operationId: adminUpdatePlan
      parameters:
        - name: plan_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminPlanWrite'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminPlanWrite'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '422':
          $ref: '#/components/responses/422'

    delete:
      tags: [AdminPlans]
      summary: Archive (soft-delete) a plan
      description: |
        Archived plans are not visible to business owners but remain
        linked to historical subscriptions.
      operationId: adminArchivePlan
      parameters:
        - name: plan_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Plan archived
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'

  /admin/subscriptions/plans/{plan_id}/activate:
    post:
      tags: [AdminPlans]
      summary: Activate a plan (make visible to business owners)
      operationId: adminActivatePlan
      parameters:
        - name: plan_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Activated
          content:
            application/json:
              schema:
                type: object
                properties:
                  is_active:
                    type: boolean
                    example: true
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'

  /admin/subscriptions/plans/{plan_id}/deactivate:
    post:
      tags: [AdminPlans]
      summary: Deactivate a plan (hide from business owners, don't archive)
      operationId: adminDeactivatePlan
      parameters:
        - name: plan_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Deactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  is_active:
                    type: boolean
                    example: false
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'

  # ═══════════════════════════════════════════════════════
  # CATEGORY MANAGEMENT
  # ═══════════════════════════════════════════════════════

  /admin/categories:
    get:
      tags: [AdminCategories]
      summary: List all categories (including inactive)
      operationId: adminListCategories
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: parent_id
          in: query
          schema:
            type: string
            format: uuid
            nullable: true
          description: Filter to children of this category. Null = root categories.
        - name: is_active
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Categories
          content:
            application/json:
              schema:
                type: object
                properties:
                  categories:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        name:
                          type: string
                        name_en:
                          type: string
                          nullable: true
                        slug:
                          type: string
                          nullable: true
                        parent_id:
                          type: string
                          format: uuid
                          nullable: true
                        depth:
                          type: integer
                          minimum: 0
                          description: |
                            Max: system_settings.category_max_depth.
                        icon_url:
                          type: string
                          format: uri
                          nullable: true
                        color:
                          type: string
                          nullable: true
                        is_active:
                          type: boolean
                        sort_order:
                          type: integer
                        business_count:
                          type: integer
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'

    post:
      tags: [AdminCategories]
      summary: Create category
      description: |
        Depth validated against system_settings.category_max_depth.
        Names are arbitrary strings — NOT hardcoded in spec.
      operationId: adminCreateCategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  maxLength: 100
                name_en:
                  type: string
                  nullable: true
                  maxLength: 100
                slug:
                  type: string
                  nullable: true
                parent_id:
                  type: string
                  format: uuid
                  nullable: true
                icon_url:
                  type: string
                  format: uri
                  nullable: true
                color:
                  type: string
                  nullable: true
                is_active:
                  type: boolean
                  default: true
                sort_order:
                  type: integer
                  default: 0
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '422':
          description: |
            Validation error or depth limit exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: CATEGORY_DEPTH_EXCEEDED
                  message: عمق دسته‌بندی از حد مجاز بیشتر است
                  details:
                    max_depth: 1
                    requested_depth: 2

  /admin/categories/{category_id}:
    put:
      tags: [AdminCategories]
      summary: Update category
      operationId: adminUpdateCategory
      parameters:
        - name: category_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                name_en:
                  type: string
                  nullable: true
                slug:
                  type: string
                  nullable: true
                icon_url:
                  type: string
                  format: uri
                  nullable: true
                color:
                  type: string
                  nullable: true
                is_active:
                  type: boolean
                sort_order:
                  type: integer
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'

    delete:
      tags: [AdminCategories]
      summary: Delete category (soft-delete if businesses use it)
      operationId: adminDeleteCategory
      parameters:
        - name: category_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Deleted or scheduled for deletion
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  businesses_affected:
                    type: integer
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'

  # ═══════════════════════════════════════════════════════
  # PROVINCE / CITY MANAGEMENT
  # ═══════════════════════════════════════════════════════

  /admin/locations/provinces:
    get:
      tags: [AdminLocations]
      summary: List all provinces (including inactive)
      operationId: adminListProvinces
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Provinces
          content:
            application/json:
              schema:
                type: object
                properties:
                  provinces:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'

    post:
      tags: [AdminLocations]
      summary: Create province
      operationId: adminCreateProvince
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  maxLength: 100
                name_en:
                  type: string
                  nullable: true
                slug:
                  type: string
                  nullable: true
                is_active:
                  type: boolean
                  default: true
                sort_order:
                  type: integer
                  default: 0
                geo_bounds:
                  type: object
                  nullable: true
                  properties:
                    north:
                      type: number
                    south:
                      type: number
                    east:
                      type: number
                    west:
                      type: number
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '422':
          $ref: '#/components/responses/422'

  /admin/locations/provinces/{province_id}:
    put:
      tags: [AdminLocations]
      summary: Update province
      operationId: adminUpdateProvince
      parameters:
        - name: province_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'

    delete:
      tags: [AdminLocations]
      summary: Delete province (soft-delete if businesses use it)
      operationId: adminDeleteProvince
      parameters:
        - name: province_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  businesses_affected:
                    type: integer
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'

  /admin/locations/cities:
    get:
      tags: [AdminLocations]
      summary: List all cities (including inactive)
      operationId: adminListCities
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: province_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Cities
          content:
            application/json:
              schema:
                type: object
                properties:
                  cities:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'

    post:
      tags: [AdminLocations]
      summary: Create city
      operationId: adminCreateCity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, province_id]
              properties:
