  # ═══════════════════════════════════════════════════════
  # REFERRAL CONFIGURATION
  # ═══════════════════════════════════════════════════════

  /admin/referral-settings:
    get:
      tags: [AdminReferral]
      summary: Get referral program configuration
      description: |
        Returns the full referral_reward_config_json from system_settings.
        All reward rules are configurable here — NOT hardcoded.
      operationId: adminGetReferralSettings
      responses:
        '200':
          description: Referral configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  is_enabled:
                    type: boolean
                  reward_type:
                    type: string
                    description: |
                      NOT an enum. Known types: "discount_percent", "free_days", "fixed_amount".
                  reward_value:
                    type: number
                  referrer_reward:
                    type: object
                    additionalProperties: true
                  referee_reward:
                    type: object
                    additionalProperties: true
                  reward_trigger:
                    type: string
                    description: |
                      NOT an enum. Known values: "on_registration", "on_subscription".
                  expiry_days:
                    type: integer
                    nullable: true
                  max_referrals_per_user:
                    type: integer
                    nullable: true
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'

    put:
      tags: [AdminReferral]
      summary: Update referral program configuration
      description: |
        Updates system_settings.referral_reward_config_json.
        All fields are configurable — NO hardcoded reward logic.
      operationId: adminUpdateReferralSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '422':
          $ref: '#/components/responses/422'

  # ═══════════════════════════════════════════════════════
  # SYSTEM SETTINGS
  # ═══════════════════════════════════════════════════════

  /admin/settings:
    get:
      tags: [AdminSystemSettings]
      summary: List all system settings
      description: |
        Returns all system_settings keys. Sensitive keys (is_sensitive=true) have
        their value masked as "***".
      operationId: adminListSettings
      parameters:
        - name: group
          in: query
          schema:
            type: string
          description: Filter by group. NOT an enum.
        - name: search
          in: query
          schema:
            type: string
          description: Search by key name
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: System settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  settings:
                    type: array
                    items:
                      $ref: '#/components/schemas/SystemSetting'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
                  groups:
                    type: array
                    items:
                      type: string
                    description: All unique group names present
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'

  /admin/settings/{key}:
    get:
      tags: [AdminSystemSettings]
      summary: Get single setting
      operationId: adminGetSetting
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Setting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemSetting'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'

    put:
      tags: [AdminSystemSettings]
      summary: Update a system setting value
      description: |
        Updates the value of a system_settings key.
        Server validates the value against the key's data_type.
        Changes take effect immediately (within cache TTL).
        Audit log entry created for every change.
      operationId: adminUpdateSetting
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value:
                  type: string
                  description: |
                    New value as string. Interpreted per data_type.
                    JSON values must be valid JSON strings.
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemSetting'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '422':
          description: Invalid value for this setting's data_type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: INVALID_SETTING_VALUE
                  message: مقدار وارد شده برای این تنظیم معتبر نیست
                  details:
                    key: search_default_radius_km
                    data_type: integer
                    provided_value: "abc"

  /admin/settings/bulk:
    patch:
      tags: [AdminSystemSettings]
      summary: Bulk update multiple settings
      description: |
        Atomic bulk update. All or nothing — if any value is invalid,
        no changes are applied.
      operationId: adminBulkUpdateSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [updates]
              properties:
                updates:
                  type: array
                  items:
                    type: object
                    required: [key, value]
                    properties:
                      key:
                        type: string
                      value:
                        type: string
      responses:
        '200':
          description: All settings updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated_count:
                    type: integer
                  settings:
                    type: array
                    items:
                      $ref: '#/components/schemas/SystemSetting'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '422':
          description: One or more values invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ═══════════════════════════════════════════════════════
  # MODERATION QUEUE
  # ═══════════════════════════════════════════════════════

  /admin/moderation:
    get:
      tags: [AdminModeration]
      summary: List moderation queue
      description: |
        Returns content items pending moderation.
        Filtered by content_type (NOT enum — from system_settings.moderation_states_json).
      operationId: adminListModerationQueue
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: content_type
          in: query
          schema:
            type: string
          description: NOT an enum. Known values from system_settings.
        - name: state
          in: query
          schema:
            type: string
          description: NOT an enum. Filter by moderation state.
        - name: priority
          in: query
          schema:
            type: string
          description: NOT an enum.
        - name: assigned_to_me
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Moderation queue
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ModerationItem'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
                  counts_by_state:
                    type: object
                    additionalProperties:
                      type: integer
                    description: NOT an enum — keys are state names.
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'

  /admin/moderation/{item_id}/review:
    post:
      tags: [AdminModeration]
      summary: Review a moderation item
      description: |
        Apply a moderation decision.
        Target state must be a valid state from system_settings.moderation_states_json.
      operationId: adminReviewModerationItem
      parameters:
        - name: item_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision:
                  type: string
                  description: |
                    NOT an enum. Known values: "approve", "reject", "flag",
                    "request_resubmission". Valid decisions from system_settings.moderation_decisions_json.
                reason:
                  type: string
                  nullable: true
                  description: Required when decision = "reject" or "request_resubmission"
                note:
                  type: string
                  nullable: true
                  description: Internal admin note
      responses:
        '200':
          description: Decision applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModerationItem'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '422':
          description: Missing reason for reject/resubmission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/businesses/{business_id}/review:
    post:
      tags: [AdminModeration]
      summary: Review a business registration
      description: |
        Approve, reject, or request resubmission of a pending_review business.
        Decision transitions business.status accordingly.
      operationId: adminReviewBusiness
      parameters:
        - name: business_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision:
                  type: string
                  description: |
                    NOT an enum. Known values: "approve", "reject", "suspend", "request_resubmission".
                reason:
                  type: string
                  nullable: true
                note:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Decision applied
          content:
            application/json:
              schema:
                type: object
                properties:
                  business_id:
                    type: string
                    format: uuid
                  new_status:
                    type: string
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'

  /admin/verification/{business_id}/review:
    post:
      tags: [AdminModeration]
      summary: Review a business identity verification submission
      operationId: adminReviewVerification
      parameters:
        - name: business_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision:
                  type: string
                  description: NOT an enum. Known values: "approve", "reject", "request_resubmission".
                reason:
                  type: string
                  nullable: true
                note:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Decision applied
          content:
            application/json:
              schema:
                type: object
                properties:
                  business_id:
                    type: string
                    format: uuid
                  new_verification_status:
                    type: string
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'

