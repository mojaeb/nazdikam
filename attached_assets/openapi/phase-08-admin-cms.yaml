  /admin/discount-codes:
    get:
      tags: [AdminDiscountCodes]
      summary: List all discount codes
      operationId: adminListDiscountCodes
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: is_active
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Discount codes
          content:
            application/json:
              schema:
                type: object
                properties:
                  codes:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'

    post:
      tags: [AdminDiscountCodes]
      summary: Create discount code
      description: |
        discount_type from system_settings.discount_code_types_json.
        applicable_plan_ids: empty = all plans.
      operationId: adminCreateDiscountCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, discount_type, discount_value]
              properties:
                code:
                  type: string
                  maxLength: 50
                discount_type:
                  type: string
                  description: NOT an enum. From system_settings.discount_code_types_json.
                discount_value:
                  type: number
                max_discount_amount:
                  type: integer
                  nullable: true
                applicable_plan_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                usage_limit:
                  type: integer
                  nullable: true
                  description: Null = unlimited uses
                per_user_limit:
                  type: integer
                  nullable: true
                starts_at:
                  type: string
                  format: date-time
                  nullable: true
                expires_at:
                  type: string
                  format: date-time
                  nullable: true
                is_active:
                  type: boolean
                  default: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '422':
          $ref: '#/components/responses/422'

