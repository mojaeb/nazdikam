openapi: 3.1.0

info:
  title: Nazdikam API
  version: 1.0.0
  description: |
    نزدیکام — Phase 6: Subscriptions & Entitlements
    Persian RTL · Mobile-first · Location-based · Northern Iran

    ## Coverage
    Plan browsing, subscription purchase/renewal/upgrade, entitlement checks,
    feature flags, usage limits, discount codes, and referral rewards.

    ## Architecture Guardrails
    - Plans are CMS-driven — NO predefined plan names in this spec
    - NO FREE/PREMIUM/VIP/GOLD enums anywhere
    - Plan names are arbitrary strings set by Super Admin
    - Feature access ONLY through entitlement check — never by plan name
    - Referral reward rules from system_settings (NOT hardcoded)
    - Discount code rules from system_settings (NOT hardcoded)
    - Payment gateway is NOT hardcoded — from system_settings.payment_gateway_key
    - Subscription duration unit: NOT hardcoded — from plans.duration_unit
    - All pricing in system_settings.platform_currency

servers:
  - url: /api
    description: Shared proxy — all paths prefixed with /api

tags:
  - name: Plans
    description: Browse available subscription plans (public to business owners)
  - name: Subscriptions
    description: Business subscription management
  - name: Entitlements
    description: Real-time entitlement checks
  - name: DiscountCodes
    description: Discount code validation and application
  - name: Referrals
    description: Referral code management and rewards

security: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true

    PaginationMeta:
      type: object
      required: [page, per_page, total, total_pages]
      properties:
        page:
          type: integer
          minimum: 1
        per_page:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        total_pages:
          type: integer
          minimum: 0

    Price:
      type: object
      properties:
        raw_amount:
          type: integer
          minimum: 0
          description: Amount in smallest unit of system_settings.platform_currency
        currency:
          type: string
          description: From system_settings.platform_currency
        display_value:
          type: string
          description: Pre-formatted display string
          examples:
            - "۴۹۰,۰۰۰ تومان"

    Plan:
      type: object
      required: [id, name, is_active, price, duration_value, duration_unit, feature_flags, usage_limits]
      description: |
        A CMS-managed subscription plan. Plan names are arbitrary strings set by Super Admin.
        This schema has NO enum for plan name, tier, or category.
        feature_flags and usage_limits keys are defined in the Feature Flag Matrix and Usage Limits Catalog.
        Clients must handle unknown flag/limit keys gracefully (forward-compatibility).
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: |
            Arbitrary plan name set by Super Admin. NOT an enum.
            Examples: "پایه", "حرفه‌ای", "ویژه" — but these are data, not code.
        slug:
          type: string
          description: |
            URL-safe slug set by Super Admin. NOT an enum.
            Used only for display routing, never for feature gate logic.
        description:
          type: string
          nullable: true
        short_description:
          type: string
          nullable: true
          description: One-line marketing description
        is_active:
          type: boolean
        is_featured:
          type: boolean
          description: Whether to highlight this plan in the UI (Super Admin toggle)
        price:
          $ref: '#/components/schemas/Price'
        original_price:
          $ref: '#/components/schemas/Price'
          nullable: true
          description: Original price if the plan is currently discounted
        duration_value:
          type: integer
          minimum: 1
          description: Numeric duration quantity (e.g. 1, 3, 12)
        duration_unit:
          type: string
          description: |
            Duration unit. NOT an enum.
            Valid values from system_settings.subscription_duration_units_json.
            Known initial values: "day", "month", "year".
          examples:
            - day
            - month
            - year
        duration_label:
          type: string
          description: Pre-formatted label, e.g. "۳ ماهه" (Super Admin set)
        feature_flags:
          type: object
          additionalProperties:
            type: boolean
          description: |
            All 23 feature flag keys from the Feature Flag Matrix.
            Keys not present are treated as false.
            Clients must NOT hard-code the set of keys.
        usage_limits:
          type: object
          additionalProperties:
            type: integer
          description: |
            All 10 plan-level usage limit keys from the Usage Limits Catalog.
            -1 means unlimited. Keys not present are treated as 0.
            Clients must NOT hard-code the set of keys.
        highlights:
          type: array
          description: |
            Admin-curated marketing highlight bullets (Persian strings).
            Ordered by sort_order.
          items:
            type: string
        sort_order:
          type: integer
          description: Display order in plan selection UI
        color:
          type: string
          nullable: true
          description: |
            Hex or CSS color for plan card accent.
            Set by Super Admin for UI differentiation.
        badge_text:
          type: string
          nullable: true
          description: |
            Optional badge text on plan card (e.g. "پرفروش‌ترین").
            NOT an enum — arbitrary string set by Super Admin.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SubscriptionStatus:
      type: string
      description: |
        Current status of the subscription.
        NOT an enum — valid values from system_settings.subscription_statuses_json.
        Known initial values: "active", "expired", "cancelled", "pending_payment",
        "grace_period", "suspended".
        Clients must handle unknown status values gracefully.
      examples:
        - active
        - expired
        - cancelled
        - pending_payment
        - grace_period

    Subscription:
      type: object
      required: [id, business_id, plan_id, status, starts_at, expires_at, created_at]
      properties:
        id:
          type: string
          format: uuid
        business_id:
          type: string
          format: uuid
        plan_id:
          type: string
          format: uuid
        plan_name:
          type: string
          description: Denormalized plan name for display (from plan snapshot)
        status:
          $ref: '#/components/schemas/SubscriptionStatus'
        starts_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        expires_at_jalali:
          type: string
          nullable: true
          description: Jalali formatted expiry date, e.g. "۱۴۰۳/۱۲/۲۹"
        grace_period_ends_at:
          type: string
          format: date-time
          nullable: true
          description: |
            End of grace period (if applicable).
            Grace period duration: system_settings.subscription_grace_period_days.
        amount_paid:
          $ref: '#/components/schemas/Price'
        discount_code_used:
          type: string
          nullable: true
        referral_code_used:
          type: string
          nullable: true
        plan_snapshot:
          type: object
          description: |
            Immutable copy of plan.feature_flags and plan.usage_limits at purchase time.
            Used for all entitlement checks during this subscription's lifetime.
            Mid-subscription plan edits do NOT affect this snapshot.
          properties:
            feature_flags:
              type: object
              additionalProperties:
                type: boolean
            usage_limits:
              type: object
              additionalProperties:
                type: integer
        auto_renew:
          type: boolean
          description: |
            Whether auto-renewal is enabled.
            Auto-renewal availability: system_settings.subscription_auto_renew_enabled.
        days_remaining:
          type: integer
          nullable: true
          description: |
            Computed: days until expires_at. Null if not active.
            Expiry warning shown when days_remaining <= system_settings.subscription_expiry_warning_days.
        created_at:
          type: string
          format: date-time

    CheckoutRequest:
      type: object
      required: [plan_id]
      properties:
        plan_id:
          type: string
          format: uuid
        discount_code:
          type: string
          nullable: true
        referral_code:
          type: string
          nullable: true
        auto_renew:
          type: boolean
          default: false

    CheckoutPreview:
      type: object
      description: |
        Preview of the checkout before payment. No charge occurs.
        Call this to show the order summary before redirecting to payment gateway.
      properties:
        plan:
          $ref: '#/components/schemas/Plan'
        base_price:
          $ref: '#/components/schemas/Price'
        discount_amount:
          $ref: '#/components/schemas/Price'
        discount_code_applied:
          type: string
          nullable: true
        referral_discount_amount:
          $ref: '#/components/schemas/Price'
        total_price:
          $ref: '#/components/schemas/Price'
        expires_at_preview:
          type: string
          format: date-time
          description: Projected expiry date after successful payment
        expires_at_preview_jalali:
          type: string
          nullable: true

    PaymentInitiation:
      type: object
      description: |
        Response from POST /checkout — redirect user to payment_url.
        On return, poll GET /subscriptions/{id} for status.
      properties:
        payment_url:
          type: string
          format: uri
          description: |
            URL to redirect the user to for payment.
            Gateway determined by system_settings.payment_gateway_key.
        subscription_id:
          type: string
          format: uuid
          description: ID of the pending subscription record
        expires_in_seconds:
          type: integer
          description: |
            Seconds until the payment session expires.
            From system_settings.payment_session_timeout_seconds.
        order_id:
          type: string
          description: Internal order reference

    DiscountCode:
      type: object
      required: [code, discount_type, discount_value, is_valid]
      properties:
        code:
          type: string
        discount_type:
          type: string
          description: |
            NOT an enum. Valid types from system_settings.discount_code_types_json.
            Known initial types: "percentage", "fixed_amount".
          examples:
            - percentage
            - fixed_amount
        discount_value:
          type: number
          description: |
            For percentage: 0–100. For fixed_amount: amount in platform currency.
        max_discount_amount:
          $ref: '#/components/schemas/Price'
          nullable: true
          description: Cap for percentage discounts
        applicable_plan_ids:
          type: array
          items:
            type: string
            format: uuid
          description: |
            Plans this code applies to. Empty array = all plans.
        is_valid:
          type: boolean
        invalid_reason:
          type: string
          nullable: true
          description: |
            Present when is_valid = false. NOT an enum.
            Known reasons: "expired", "usage_limit_reached", "not_started",
            "plan_not_eligible", "already_used".
        uses_remaining:
          type: integer
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true

    ReferralCode:
      type: object
      required: [code, referral_url]
      properties:
        code:
          type: string
        referral_url:
          type: string
          format: uri
          description: Pre-built share URL
        total_referrals:
          type: integer
        successful_referrals:
          type: integer
          description: Referrals that resulted in a subscription purchase
        pending_rewards:
          type: integer
          description: Count of rewards awaiting claim
        claimed_rewards:
          type: integer
        reward_config:
          type: object
          description: |
            Current reward configuration from system_settings.
            Exposed to owner for display in UI.
          properties:
            reward_type:
              type: string
              description: |
                NOT an enum. Known types: "discount_percent", "free_days", "fixed_amount".
            reward_value:
              type: number
            per_referral_reward:
              type: object
              additionalProperties: true
              description: Full reward configuration. Keys from system_settings.referral_reward_config_json.

    ReferralEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        referred_business_name:
          type: string
          nullable: true
          description: Masked for privacy if not yet subscribed
        status:
          type: string
          description: |
            NOT an enum. Known values: "registered", "subscribed", "reward_pending",
            "reward_claimed", "expired".
        reward_amount:
          $ref: '#/components/schemas/Price'
          nullable: true
        subscribed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

  parameters:
    BusinessIdPath:
      name: business_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1

    PerPageParam:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 20

  responses:
    401:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    404:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    422:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

paths:

  # ═══════════════════════════════════════════════════════
  # PLANS
  # ═══════════════════════════════════════════════════════

  /subscriptions/plans:
    get:
      tags: [Plans]
      summary: List all active subscription plans
      description: |
        Returns all active plans visible to business owners.
        Plans are fully CMS-driven. No plan names, tiers, or features are hardcoded.
        Cache: system_settings.plans_cache_ttl_seconds.
        Rate limit: system_settings.rate_limit_plans_per_ip_per_minute.
      operationId: listPlans
      security: []
      parameters:
        - name: sort_by
          in: query
          schema:
            type: string
          description: |
            NOT an enum. Default: system_settings.plans_default_sort ("sort_order").
      responses:
        '200':
          description: Available plans
          headers:
            Cache-Control:
              schema:
                type: string
              example: "public, max-age=300"
          content:
            application/json:
              schema:
                type: object
                properties:
                  plans:
                    type: array
                    items:
                      $ref: '#/components/schemas/Plan'
                  currency:
                    type: string
                    description: system_settings.platform_currency
                  note:
                    type: string
                    nullable: true
                    description: |
                      Optional admin-set promotional note (e.g. "تخفیف ۲۰٪ تا پایان ماه").
                      From system_settings.plans_promotional_note.

  /subscriptions/plans/{plan_id}:
    get:
      tags: [Plans]
      summary: Get a single plan
      operationId: getPlan
      security: []
      parameters:
        - name: plan_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Plan detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plan'
        '404':
          $ref: '#/components/responses/404'

  # ═══════════════════════════════════════════════════════
  # SUBSCRIPTIONS
  # ═══════════════════════════════════════════════════════

  /businesses/{business_id}/subscription:
    get:
      tags: [Subscriptions]
      summary: Get current subscription status
      description: |
        Returns the active (or most recent) subscription for the business.
        Access level: BUSINESS_FREE.
      operationId: getSubscription
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
      responses:
        '200':
          description: Current subscription
          content:
            application/json:
              schema:
                type: object
                properties:
                  subscription:
                    $ref: '#/components/schemas/Subscription'
                    nullable: true
                  has_active_subscription:
                    type: boolean
                  expiry_warning:
                    type: boolean
                    description: |
                      True when days_remaining <= system_settings.subscription_expiry_warning_days.
        '401':
          $ref: '#/components/responses/401'
        '403':
          description: Forbidden — not owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /businesses/{business_id}/subscription/history:
    get:
      tags: [Subscriptions]
      summary: Subscription purchase history
      operationId: getSubscriptionHistory
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Subscription history
          content:
            application/json:
              schema:
                type: object
                properties:
                  subscriptions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Subscription'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/401'

  /businesses/{business_id}/subscription/checkout/preview:
    post:
      tags: [Subscriptions]
      summary: Preview checkout (no charge)
      description: |
        Calculates the final price after discounts/referral rewards.
        No payment initiated. Use to render order summary.
        Rate limit: system_settings.rate_limit_checkout_preview_per_user_per_minute.
      operationId: previewCheckout
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
      responses:
        '200':
          description: Checkout preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutPreview'
        '401':
          $ref: '#/components/responses/401'
        '422':
          description: |
            Invalid plan, expired discount code, invalid referral code, etc.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /businesses/{business_id}/subscription/checkout:
    post:
      tags: [Subscriptions]
      summary: Initiate subscription purchase
      description: |
        Creates a pending subscription and returns a payment URL.
        User must be redirected to payment_url to complete payment.
        On return from gateway, poll GET /businesses/{id}/subscription for status.
        Payment gateway from system_settings.payment_gateway_key.
        Rate limit: system_settings.rate_limit_checkout_per_user_per_day.
      operationId: initiateCheckout
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRequest'
      responses:
        '201':
          description: Payment initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentInitiation'
        '401':
          $ref: '#/components/responses/401'
        '422':
          description: Invalid plan, discount code, or referral code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_discount:
                  value:
                    error:
                      code: DISCOUNT_CODE_INVALID
                      message: کد تخفیف معتبر نیست
                      details:
                        reason: expired
                plan_inactive:
                  value:
                    error:
                      code: PLAN_NOT_AVAILABLE
                      message: این پلن در دسترس نیست

  /businesses/{business_id}/subscription/payment-callback:
    post:
      tags: [Subscriptions]
      summary: Payment gateway callback (internal)
      description: |
        Called by the payment gateway after payment completion.
        NOT for frontend use. Verifies payment with gateway API.
        Activates subscription if successful.
        Gateway verification: system_settings.payment_gateway_key.
        This endpoint is NOT authenticated with BearerAuth — it uses a
        gateway-specific verification mechanism (HMAC, token, etc.)
        from system_settings.payment_callback_secret_key (secret, server-only).
      operationId: paymentCallback
      security: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: |
                Gateway-specific payload. Shape depends on system_settings.payment_gateway_key.
                Server parses according to the configured gateway adapter.
      responses:
        '200':
          description: Callback processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  subscription_id:
                    type: string
                    format: uuid
                    nullable: true
        '400':
          description: Invalid callback signature or payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /businesses/{business_id}/subscriptions/{subscription_id}:
    get:
      tags: [Subscriptions]
      summary: Get a specific subscription record
      operationId: getSubscriptionById
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
        - name: subscription_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Subscription detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'

  /businesses/{business_id}/subscription/auto-renew:
    patch:
      tags: [Subscriptions]
      summary: Toggle auto-renew
      description: |
        Enable/disable auto-renewal for the current active subscription.
        Only available if system_settings.subscription_auto_renew_enabled = true.
      operationId: toggleAutoRenew
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [auto_renew]
              properties:
                auto_renew:
                  type: boolean
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  auto_renew:
                    type: boolean
        '401':
          $ref: '#/components/responses/401'
        '422':
          description: Auto-renew not available (disabled in system_settings)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ═══════════════════════════════════════════════════════
  # ENTITLEMENTS
  # ═══════════════════════════════════════════════════════

  /businesses/{business_id}/entitlements:
    get:
      tags: [Entitlements]
      summary: Get current entitlements for a business
      description: |
        Returns the full entitlement state derived from the active subscription snapshot.
        Used by frontends to render locked/unlocked UI states.
        Server independently enforces all gates on every request.
        Cache: short-lived (system_settings.entitlements_cache_ttl_seconds).
      operationId: getEntitlements
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
      responses:
        '200':
          description: Current entitlements
          content:
            application/json:
              schema:
                type: object
                properties:
                  has_active_subscription:
                    type: boolean
                  subscription_status:
                    $ref: '#/components/schemas/SubscriptionStatus'
                    nullable: true
                  plan_id:
                    type: string
                    format: uuid
                    nullable: true
                  plan_name:
                    type: string
                    nullable: true
                  feature_flags:
                    type: object
                    additionalProperties:
                      type: boolean
                    description: |
                      All feature flags from the active plan snapshot.
                      False for all flags if no active subscription.
                  usage_limits:
                    type: object
                    additionalProperties:
                      type: integer
                    description: |
                      All usage limits from the active plan snapshot.
                      0 for all limits if no active subscription.
                  current_usage:
                    type: object
                    additionalProperties:
                      type: integer
                    description: Current consumption per limit key
                  expires_at:
                    type: string
                    format: date-time
                    nullable: true
                  days_remaining:
                    type: integer
                    nullable: true
        '401':
          $ref: '#/components/responses/401'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /businesses/{business_id}/entitlements/check:
    post:
      tags: [Entitlements]
      summary: Check a specific entitlement
      description: |
        Point-in-time check for a specific feature flag or usage limit.
        Returns whether the action is allowed and the reason if not.
        Useful for pre-flight checks before showing a gated UI action.
      operationId: checkEntitlement
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [check_type, key]
              properties:
                check_type:
                  type: string
                  description: |
                    "feature_flag" or "usage_limit"
                key:
                  type: string
                  description: The flag or limit key to check
                  examples:
                    - can_manage_products
                    - max_videos
      responses:
        '200':
          description: Entitlement check result
          content:
            application/json:
              schema:
                type: object
                properties:
                  is_allowed:
                    type: boolean
                  check_type:
                    type: string
                  key:
                    type: string
                  current_value:
                    description: Current flag value (bool) or current usage (int)
                    oneOf:
                      - type: boolean
                      - type: integer
                    nullable: true
                  limit_value:
                    type: integer
                    nullable: true
                    description: The limit threshold (for usage_limit checks)
                  denial_reason:
                    type: string
                    nullable: true
                    description: |
                      NOT an enum. Known values: "no_subscription", "flag_false",
                      "limit_reached", "subscription_expired".
                  upgrade_path:
                    type: string
                    nullable: true
                    description: API path to plans endpoint
        '401':
          $ref: '#/components/responses/401'

  # ═══════════════════════════════════════════════════════
  # DISCOUNT CODES
  # ═══════════════════════════════════════════════════════

  /subscriptions/discount-codes/validate:
    post:
      tags: [DiscountCodes]
      summary: Validate a discount code
      description: |
        Validates a discount code against a specific plan.
        Does NOT consume the code. Call checkout to actually apply it.
        Rate limit: system_settings.rate_limit_discount_validate_per_user_per_minute.
      operationId: validateDiscountCode
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, plan_id]
              properties:
                code:
                  type: string
                plan_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscountCode'
        '401':
          $ref: '#/components/responses/401'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ═══════════════════════════════════════════════════════
  # REFERRALS
  # ═══════════════════════════════════════════════════════

  /businesses/{business_id}/referral:
    get:
      tags: [Referrals]
      summary: Get referral code and stats
      description: |
        Feature gate: can_use_referral_system.
        Referral reward config from system_settings.referral_reward_config_json.
      operationId: getReferral
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
      responses:
        '200':
          description: Referral code and stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReferralCode'
        '401':
          $ref: '#/components/responses/401'
        '403':
          description: Feature flag denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: FEATURE_FLAG_DENIED
                  message: این ویژگی در پلن فعلی شما در دسترس نیست
                  details:
                    flag: can_use_referral_system

  /businesses/{business_id}/referral/history:
    get:
      tags: [Referrals]
      summary: Referral history and reward status
      description: Feature gate: can_use_referral_system.
      operationId: getReferralHistory
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: status
          in: query
          schema:
            type: string
          description: |
            Filter by referral status. NOT an enum.
      responses:
        '200':
          description: Referral history
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      $ref: '#/components/schemas/ReferralEntry'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
                  summary:
                    type: object
                    properties:
                      total_referrals:
                        type: integer
                      successful_referrals:
                        type: integer
                      total_rewards_earned:
                        $ref: '#/components/schemas/Price'
        '401':
          $ref: '#/components/responses/401'
        '403':
          description: Feature flag denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /referral/validate:
    post:
      tags: [Referrals]
      summary: Validate a referral code (during registration)
      description: |
        Public endpoint. Validates a referral code entered during business registration.
        Does NOT apply the reward — rewards are triggered by subscription purchase.
        Rate limit: system_settings.rate_limit_referral_validate_per_ip_per_minute.
      operationId: validateReferralCode
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
      responses:
        '200':
          description: Referral code validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  is_valid:
                    type: boolean
                  referrer_name:
                    type: string
                    nullable: true
                    description: Optional masked name of the referrer business
                  reward_description:
                    type: string
                    nullable: true
                    description: Human-readable reward description (Persian)
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
