openapi: 3.1.0

info:
  title: Nazdikam API
  version: 1.0.0
  description: |
    نزدیکام — Phase 5: Videos & Announcements
    Persian RTL · Mobile-first · Location-based · Northern Iran

    ## Coverage
    Video CRUD, announcement CRUD, moderation states,
    publishing lifecycle, visibility controls, and public video feed.

    ## Architecture Guardrails
    - Video duration limits: usage_limits.max_video_duration_seconds (NOT hardcoded)
    - Video file size limits: usage_limits.max_video_file_size_mb (NOT hardcoded)
    - Max video count: usage_limits.max_videos (NOT hardcoded)
    - Max announcement count: usage_limits.max_announcements (NOT hardcoded)
    - Moderation workflow: configurable via system_settings — NOT hardcoded
    - Announcement date range: validated against system_settings.announcement_max_duration_days
    - Video formats: system_settings.allowed_video_formats_json (NOT hardcoded)
    - Feature gates: entitlements only — no plan-name logic

servers:
  - url: /api
    description: Shared proxy — all paths prefixed with /api

tags:
  - name: Videos
    description: Video management by business owners
  - name: VideosFeed
    description: Public video feed and video detail
  - name: Announcements
    description: Announcement management by business owners
  - name: AnnouncementsPublic
    description: Public-facing announcements

security: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true

    PaginationMeta:
      type: object
      required: [page, per_page, total, total_pages]
      properties:
        page:
          type: integer
          minimum: 1
        per_page:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        total_pages:
          type: integer
          minimum: 0

    VideoModerationState:
      type: string
      description: |
        Moderation state for a video.
        NOT an enum — valid states from system_settings.moderation_states_json.
        Known initial states: "processing", "pending_review", "approved", "rejected", "flagged".
        The "processing" state is transient — video is being transcoded.
        Clients must handle unknown moderation state values gracefully.
      examples:
        - processing
        - pending_review
        - approved
        - rejected
        - flagged

    VideoPublishState:
      type: string
      description: |
        Owner-controlled publish state.
        NOT an enum — valid states: "draft", "published", "archived".
        A video is visible publicly only when publish_state = "published"
        AND moderation_state = "approved".
      examples:
        - draft
        - published
        - archived

    Video:
      type: object
      required: [id, business_id, title, publish_state, moderation_state, created_at]
      properties:
        id:
          type: string
          format: uuid
        business_id:
          type: string
          format: uuid
        title:
          type: string
          description: Max from system_settings.video_title_max_length
        description:
          type: string
          nullable: true
          description: Max from system_settings.video_description_max_length
        video_url:
          type: string
          format: uri
          nullable: true
          description: CDN URL of the transcoded video. Null while processing.
        cover_image_url:
          type: string
          format: uri
          nullable: true
          description: |
            Cover thumbnail. Auto-generated from first frame, or owner-uploaded.
            If null, client uses platform default thumbnail.
        duration_seconds:
          type: integer
          nullable: true
          minimum: 1
          description: |
            Detected duration after processing.
            Maximum: usage_limits.max_video_duration_seconds.
        file_size_mb:
          type: number
          format: float
          nullable: true
          description: Actual file size. Maximum: usage_limits.max_video_file_size_mb.
        publish_state:
          $ref: '#/components/schemas/VideoPublishState'
        moderation_state:
          $ref: '#/components/schemas/VideoModerationState'
        rejection_reason:
          type: string
          nullable: true
          description: Admin-provided reason for rejected moderation state
        is_visible:
          type: boolean
          description: |
            Computed field: true when publish_state = "published" AND moderation_state = "approved"
        view_count:
          type: integer
          minimum: 0
          description: |
            Available to owner. Feature gate: can_view_video_analytics.
            Always 0 for unauthenticated requests or non-owner requests.
        tags:
          type: array
          items:
            type: string
          description: Free-form tags. Max count: system_settings.video_max_tags.
        attributes:
          type: object
          additionalProperties: true
          description: Extensible attributes. Keys managed in Admin CMS.
        processing_progress:
          type: integer
          nullable: true
          minimum: 0
          maximum: 100
          description: Upload/transcode progress percentage (0-100). Null when not processing.
        created_at:
          type: string
          format: date-time
        published_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time

    AnnouncementStatus:
      type: string
      description: |
        Computed announcement status based on dates and publish state.
        NOT an enum — known values: "draft", "scheduled", "active", "expired", "archived".
        Clients must handle unknown status values gracefully.
      examples:
        - draft
        - scheduled
        - active
        - expired
        - archived

    Announcement:
      type: object
      required: [id, business_id, title, publish_state, created_at]
      properties:
        id:
          type: string
          format: uuid
        business_id:
          type: string
          format: uuid
        title:
          type: string
          description: Max from system_settings.announcement_title_max_length
        body:
          type: string
          nullable: true
          description: |
            Rich text content (Markdown or plain text).
            Max from system_settings.announcement_body_max_length.
        cover_image_url:
          type: string
          format: uri
          nullable: true
        publish_state:
          type: string
          description: |
            Owner-controlled: "draft" | "published" | "archived".
            NOT an enum — extensible.
        status:
          $ref: '#/components/schemas/AnnouncementStatus'
          description: Computed read-only status
        moderation_state:
          type: string
          description: |
            Moderation state. NOT an enum.
            Valid values from system_settings.moderation_states_json.
        starts_at:
          type: string
          format: date-time
          nullable: true
          description: |
            When the announcement becomes visible.
            If null, visible immediately upon publishing.
        ends_at:
          type: string
          format: date-time
          nullable: true
          description: |
            When the announcement expires.
            Duration must not exceed system_settings.announcement_max_duration_days.
        is_pinned:
          type: boolean
          default: false
          description: |
            Whether pinned to top of business profile.
            Max pinned: system_settings.announcement_max_pinned.
        cta_label:
          type: string
          nullable: true
          description: |
            Call-to-action button label (Persian).
            Max from system_settings.announcement_cta_label_max_length.
        cta_url:
          type: string
          format: uri
          nullable: true
          description: CTA button destination URL
        attributes:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

  parameters:
    BusinessIdPath:
      name: business_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    VideoIdPath:
      name: video_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    AnnouncementIdPath:
      name: announcement_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1

    PerPageParam:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 20
      description: Max from system_settings.search_max_per_page

  responses:
    401:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    403FeatureFlag:
      description: Feature flag denied
      headers:
        X-Feature-Flag:
          schema:
            type: string
        X-Entitlement-Status:
          schema:
            type: string
            enum: [denied]
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: FEATURE_FLAG_DENIED
              message: این ویژگی در پلن فعلی شما در دسترس نیست
              details:
                flag: can_manage_videos
                upgrade_path: /api/subscriptions/plans

    403UsageLimit:
      description: Usage limit reached
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: USAGE_LIMIT_REACHED
              message: به حداکثر تعداد ویدیو رسیده‌اید
              details:
                limit_key: max_videos
                current: 10
                maximum: 10
                upgrade_path: /api/subscriptions/plans

    404:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    422:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    413:
      description: File too large
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: FILE_TOO_LARGE
              message: حجم فایل بیش از حد مجاز است
              details:
                max_mb: 100

paths:

  # ═══════════════════════════════════════════════════════
  # VIDEOS — OWNER MANAGEMENT
  # ═══════════════════════════════════════════════════════

  /businesses/{business_id}/videos:
    get:
      tags: [Videos]
      summary: List business videos (owner view)
      description: |
        Returns all videos including drafts and non-approved.
        Access level: BUSINESS_FREE (view-only if no subscription).
      operationId: listVideos
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: publish_state
          in: query
          schema:
            type: string
          description: |
            Filter by publish state. NOT an enum.
        - name: moderation_state
          in: query
          schema:
            type: string
          description: |
            Filter by moderation state. NOT an enum.
            Valid values from system_settings.moderation_states_json.
      responses:
        '200':
          description: Videos list
          content:
            application/json:
              schema:
                type: object
                properties:
                  videos:
                    type: array
                    items:
                      $ref: '#/components/schemas/Video'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
                  entitlement_context:
                    type: object
                    properties:
                      can_manage_videos:
                        type: boolean
                      max_videos:
                        type: integer
                      current_video_count:
                        type: integer
                      max_video_duration_seconds:
                        type: integer
                        description: From usage_limits
                      max_video_file_size_mb:
                        type: integer
                        description: From usage_limits
        '401':
          $ref: '#/components/responses/401'

    post:
      tags: [Videos]
      summary: Upload a new video
      description: |
        Initiates a video upload. Returns immediately with a Video record in
        moderation_state = "processing". After transcoding completes, the state
        transitions to "pending_review" or "approved" based on
        system_settings.content_auto_approve.

        Feature gate: can_manage_videos.
        Usage limit: max_videos (per business).
        File size: usage_limits.max_video_file_size_mb.
        Duration validated after processing: usage_limits.max_video_duration_seconds.
        Accepted formats: system_settings.allowed_video_formats_json.
      operationId: uploadVideo
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, title]
              properties:
                file:
                  type: string
                  format: binary
                title:
                  type: string
                  maxLength: 100
                  description: Max from system_settings.video_title_max_length
                description:
                  type: string
                  nullable: true
                  maxLength: 500
                  description: Max from system_settings.video_description_max_length
                tags:
                  type: string
                  description: |
                    Comma-separated tag list.
                    Max tags: system_settings.video_max_tags.
                cover_image:
                  type: string
                  format: binary
                  description: Optional custom cover image
      responses:
        '202':
          description: |
            Video accepted for processing.
            Returns immediately; video_url is null until processing completes.
            Poll GET /businesses/{id}/videos/{vid} to check progress.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Video'
        '401':
          $ref: '#/components/responses/401'
        '403':
          description: Feature flag denied or usage limit reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          $ref: '#/components/responses/413'
        '422':
          description: |
            Validation error. Also returned if video duration exceeds
            usage_limits.max_video_duration_seconds (detected during upload).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: VIDEO_DURATION_EXCEEDED
                  message: مدت ویدیو بیش از حد مجاز است
                  details:
                    max_seconds: 180
                    detected_seconds: 245

  /businesses/{business_id}/videos/{video_id}:
    get:
      tags: [Videos]
      summary: Get video detail (owner view)
      operationId: getVideo
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
        - $ref: '#/components/parameters/VideoIdPath'
      responses:
        '200':
          description: Video detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Video'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'

    patch:
      tags: [Videos]
      summary: Update video metadata
      description: |
        Updates title, description, tags, cover_image, publish_state.
        Feature gate: can_manage_videos.
        Cannot update video file itself — delete and re-upload.
      operationId: updateVideo
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
        - $ref: '#/components/parameters/VideoIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  maxLength: 100
                description:
                  type: string
                  nullable: true
                  maxLength: 500
                publish_state:
                  type: string
                  description: |
                    Allowed transitions: draft→published, published→archived,
                    archived→published. "processing" and "rejected" are system-only states
                    and cannot be set by owner.
                tags:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Video'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403FeatureFlag'
        '404':
          $ref: '#/components/responses/404'
        '422':
          $ref: '#/components/responses/422'

    delete:
      tags: [Videos]
      summary: Delete video
      description: |
        Soft-deletes. Storage reclaimed asynchronously.
        Feature gate: can_manage_videos.
      operationId: deleteVideo
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
        - $ref: '#/components/parameters/VideoIdPath'
      responses:
        '204':
          description: Deleted
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403FeatureFlag'
        '404':
          $ref: '#/components/responses/404'

  /businesses/{business_id}/videos/{video_id}/cover:
    put:
      tags: [Videos]
      summary: Upload or replace video cover image
      description: |
        Feature gate: can_manage_videos.
        Max file size: usage_limits.max_image_file_size_mb.
      operationId: uploadVideoCover
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
        - $ref: '#/components/parameters/VideoIdPath'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Cover updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  cover_image_url:
                    type: string
                    format: uri
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403FeatureFlag'
        '413':
          $ref: '#/components/responses/413'

  # ═══════════════════════════════════════════════════════
  # PUBLIC VIDEO FEED
  # ═══════════════════════════════════════════════════════

  /videos:
    get:
      tags: [VideosFeed]
      summary: Platform-wide video feed
      description: |
        Returns published + approved videos from all businesses.
        Used by the public video feed page.
        Cache: system_settings.video_feed_cache_ttl_seconds.
        Rate limit: system_settings.rate_limit_video_feed_per_ip_per_minute.
        Sort order from system_settings.video_feed_default_sort.
      operationId: getVideoFeed
      security: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: province_id
          in: query
          schema:
            type: string
            format: uuid
        - name: city_id
          in: query
          schema:
            type: string
            format: uuid
        - name: category_id
          in: query
          schema:
            type: string
            format: uuid
        - name: business_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter to a specific business
        - name: sort_by
          in: query
          schema:
            type: string
          description: |
            Sort key. NOT an enum.
            Default: system_settings.video_feed_default_sort.
      responses:
        '200':
          description: Video feed
          headers:
            Cache-Control:
              schema:
                type: string
              example: "public, max-age=60"
          content:
            application/json:
              schema:
                type: object
                properties:
                  videos:
                    type: array
                    items:
                      $ref: '#/components/schemas/Video'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'

  /videos/{video_id}:
    get:
      tags: [VideosFeed]
      summary: Get single video (public)
      description: |
        Returns public video detail.
        POST to /videos/{id}/view to record a view event (see below).
        Cache: system_settings.video_detail_cache_ttl_seconds.
      operationId: getPublicVideo
      security: []
      parameters:
        - $ref: '#/components/parameters/VideoIdPath'
      responses:
        '200':
          description: Video detail
          headers:
            Cache-Control:
              schema:
                type: string
              example: "public, max-age=60"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Video'
        '404':
          $ref: '#/components/responses/404'

  /videos/{video_id}/view:
    post:
      tags: [VideosFeed]
      summary: Record a video view event
      description: |
        Increments the view counter for analytics.
        Idempotent within a session window (deduplication window:
        system_settings.video_view_dedup_window_seconds).
        Rate limit: system_settings.rate_limit_video_view_per_ip_per_minute.
        No auth required. Anonymous views are counted.
      operationId: recordVideoView
      security: []
      parameters:
        - $ref: '#/components/parameters/VideoIdPath'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                watch_duration_seconds:
                  type: integer
                  minimum: 0
                  nullable: true
                  description: |
                    How long the user watched before stopping.
                    Used for watch-time analytics. Optional.
      responses:
        '204':
          description: View recorded (or deduplicated — same response)
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Business Public Videos ───────────────────────────────────────────────

  /businesses/{business_id}/videos/public:
    get:
      tags: [VideosFeed]
      summary: List published videos for a business (public)
      operationId: listPublicBusinessVideos
      security: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Business videos
          headers:
            Cache-Control:
              schema:
                type: string
              example: "public, max-age=60"
          content:
            application/json:
              schema:
                type: object
                properties:
                  videos:
                    type: array
                    items:
                      $ref: '#/components/schemas/Video'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '404':
          $ref: '#/components/responses/404'

  # ═══════════════════════════════════════════════════════
  # ANNOUNCEMENTS — OWNER MANAGEMENT
  # ═══════════════════════════════════════════════════════

  /businesses/{business_id}/announcements:
    get:
      tags: [Announcements]
      summary: List business announcements (owner view)
      description: |
        Returns all announcements including drafts.
        Access level: BUSINESS_FREE (view-only if no subscription).
      operationId: listAnnouncements
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: status
          in: query
          schema:
            type: string
          description: |
            Filter by computed status. NOT an enum.
            Known values: "draft", "scheduled", "active", "expired", "archived".
      responses:
        '200':
          description: Announcements list
          content:
            application/json:
              schema:
                type: object
                properties:
                  announcements:
                    type: array
                    items:
                      $ref: '#/components/schemas/Announcement'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
                  entitlement_context:
                    type: object
                    properties:
                      can_manage_announcements:
                        type: boolean
                      max_announcements:
                        type: integer
                      current_active_count:
                        type: integer
        '401':
          $ref: '#/components/responses/401'

    post:
      tags: [Announcements]
      summary: Create announcement
      description: |
        Feature gate: can_manage_announcements.
        Usage limit: max_announcements (counts simultaneously active announcements).
        Max date range: system_settings.announcement_max_duration_days.
        Announcement title max: system_settings.announcement_title_max_length.
        Body max: system_settings.announcement_body_max_length.
      operationId: createAnnouncement
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                  maxLength: 150
                  description: Max from system_settings.announcement_title_max_length
                body:
                  type: string
                  nullable: true
                  maxLength: 2000
                  description: Max from system_settings.announcement_body_max_length
                publish_state:
                  type: string
                  default: draft
                  description: "draft" | "published"
                starts_at:
                  type: string
                  format: date-time
                  nullable: true
                  description: |
                    Optional scheduled start. Must be in the future if set.
                ends_at:
                  type: string
                  format: date-time
                  nullable: true
                  description: |
                    Optional expiry. ends_at - starts_at must not exceed
                    system_settings.announcement_max_duration_days.
                is_pinned:
                  type: boolean
                  default: false
                cta_label:
                  type: string
                  nullable: true
                  maxLength: 50
                cta_url:
                  type: string
                  format: uri
                  nullable: true
                attributes:
                  type: object
                  additionalProperties: true
                  nullable: true
      responses:
        '201':
          description: Announcement created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Announcement'
        '401':
          $ref: '#/components/responses/401'
        '403':
          description: Feature flag denied or usage limit reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error or date range exceeds maximum
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: ANNOUNCEMENT_DURATION_EXCEEDED
                  message: مدت اطلاعیه بیش از حد مجاز است
                  details:
                    max_days: 30
                    requested_days: 45

  /businesses/{business_id}/announcements/{announcement_id}:
    get:
      tags: [Announcements]
      summary: Get announcement (owner view)
      operationId: getAnnouncement
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
        - $ref: '#/components/parameters/AnnouncementIdPath'
      responses:
        '200':
          description: Announcement detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Announcement'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'

    patch:
      tags: [Announcements]
      summary: Update announcement
      description: |
        Feature gate: can_manage_announcements.
        Cannot update expired announcements.
      operationId: updateAnnouncement
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
        - $ref: '#/components/parameters/AnnouncementIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  maxLength: 150
                body:
                  type: string
                  nullable: true
                  maxLength: 2000
                publish_state:
                  type: string
                starts_at:
                  type: string
                  format: date-time
                  nullable: true
                ends_at:
                  type: string
                  format: date-time
                  nullable: true
                is_pinned:
                  type: boolean
                cta_label:
                  type: string
                  nullable: true
                cta_url:
                  type: string
                  format: uri
                  nullable: true
                attributes:
                  type: object
                  additionalProperties: true
                  nullable: true
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Announcement'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403FeatureFlag'
        '404':
          $ref: '#/components/responses/404'
        '422':
          $ref: '#/components/responses/422'

    delete:
      tags: [Announcements]
      summary: Delete announcement
      description: |
        Feature gate: can_manage_announcements. Soft-delete.
      operationId: deleteAnnouncement
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
        - $ref: '#/components/parameters/AnnouncementIdPath'
      responses:
        '204':
          description: Deleted
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403FeatureFlag'
        '404':
          $ref: '#/components/responses/404'

  /businesses/{business_id}/announcements/{announcement_id}/cover:
    put:
      tags: [Announcements]
      summary: Upload announcement cover image
      description: |
        Feature gate: can_manage_announcements.
        Max file size: usage_limits.max_image_file_size_mb.
      operationId: uploadAnnouncementCover
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
        - $ref: '#/components/parameters/AnnouncementIdPath'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Cover uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  cover_image_url:
                    type: string
                    format: uri
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403FeatureFlag'
        '413':
          $ref: '#/components/responses/413'

  # ═══════════════════════════════════════════════════════
  # PUBLIC ANNOUNCEMENTS
  # ═══════════════════════════════════════════════════════

  /businesses/{business_id}/announcements/public:
    get:
      tags: [AnnouncementsPublic]
      summary: List active announcements for a business (public)
      description: |
        Returns only published + active announcements.
        Sorted: pinned first, then by starts_at desc.
        Cache: system_settings.announcement_cache_ttl_seconds.
      operationId: listPublicAnnouncements
      security: []
      parameters:
        - $ref: '#/components/parameters/BusinessIdPath'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Active announcements
          headers:
            Cache-Control:
              schema:
                type: string
              example: "public, max-age=120"
          content:
            application/json:
              schema:
                type: object
                properties:
                  announcements:
                    type: array
                    items:
                      $ref: '#/components/schemas/Announcement'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '404':
          $ref: '#/components/responses/404'
